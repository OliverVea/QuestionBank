# MINIMAL / self-sufficient profile for QuestionBank (Tier-A decoupling).
#
# This profile deploys the app + its own deps ONLY: no public Ingress, no Authentik
# forward-auth, reachable in-cluster via the ClusterIP Service. It is what the
# QuestionBank self-deploy pipeline's prod stage uses (.pipelines/scripts/deploy.sh
# passes `-f values-minimal.yaml`), and what a cold `pl install`-style bring-up
# would use.
#
# The shared infrastructure this app CONSUMES — Cloudflare ingress/DNS routing and
# the Authentik auth SYSTEM — is owned by the separate Olve.Homelab pipeline, which
# deploys it as separate k8s resources (no helm-release conflict). The app flipping
# ITSELF on (pointing at that auth) is a deploy-time value this pipeline owns:
# QB_ALLOW_DEFAULT_CUSTOMER, baselined to "0" here and overridable per-deploy via
# --set (driven by the QB_PROD_ALLOW_DEFAULT_CUSTOMER pipeline secret).

# No public ingress in the minimal profile — Olve.Homelab owns routing.
ingress:
  enabled: false

# App-level OIDC: /api/* requires a valid Authentik bearer token (issued for this
# authority, aud=questionbank) while /api/health stays open. There is no
# default-customer fallback any more — the server authenticates every /api request
# against the token, so prod is gated by Authentik regardless of ingress.
config:
  NODE_ENV: "production"
  PORT: "3001"
  QB_DATA_DIR: "/data"
  QB_OIDC_AUTHORITY: "https://auth.ovea.pro/application/o/questionbank/"
  QB_OIDC_AUDIENCE: "questionbank"
  # In-cluster figure-service (deployed to apps first within the deploy step).
  FIGURE_SERVICE_URL: "http://questionbank-figures.apps.svc.cluster.local"

# Prod LLM key. deploy.sh materializes questionbank-secrets in `apps` from the
# ANTHROPIC_API_KEY pipeline secret before the helm upgrade; mounted here (mirrors beta).
#
# figure-service-auth (key api-key) is created in apps by deploy.sh (figures deploy
# first, in the same step); mounted here as FIGURE_SERVICE_API_KEY so the server
# authenticates to the figure-service.
secrets:
  - name: questionbank-secrets
    envMap:
      ANTHROPIC_API_KEY: anthropic-api-key
  - name: figure-service-auth
    envMap:
      FIGURE_SERVICE_API_KEY: api-key
