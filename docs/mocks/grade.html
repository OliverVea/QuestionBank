<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <!-- PWA: installable, runs in its own window (standalone). -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#f9ae60" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="QuestionBank" />
  <title>Question Bank — Grade Chat Mock</title>
  <link rel="stylesheet" href="vendor/katex/katex.min.css" />
  <link rel="stylesheet" href="mocks.css" />
  <link rel="stylesheet" href="grade.css" />
</head>
<body class="anim-cascade">
  <script src="vendor/katex/katex.min.js"></script>
  <!-- `.grade-page` is the grid shell (prod vocabulary). The engineering-pad
       grid lives on the chat container so it shows behind the chat only. -->
  <div class="grade-page">
    <!-- Top bar: Back (left) / Skip + when-it-returns (right) -->
    <header class="topbar">
      <button class="topbar-btn" id="back-btn">
        <span aria-hidden="true">←</span> Back
      </button>
      <button class="topbar-btn" id="skip-btn">
        Skip <span class="tb-sub">12h</span>
      </button>
    </header>

    <!-- Collapsible question, so the chat gets the room -->
    <details class="qfold" id="qfold">
      <summary class="qfold-summary">
        <span class="qfold-label">Question</span>
        <span class="qfold-ctx" id="q-eyebrow">Griffiths · Chapter 2 · Problem 1</span>
        <span class="qfold-chev" aria-hidden="true">⌄</span>
      </summary>
      <div class="qfold-body" id="q-body"><!-- rendered question --></div>
    </details>

    <!-- The grading conversation -->
    <main class="chat-container gridpad" id="chat"><!-- turns injected below --></main>

    <!-- Bottom: reply box + save/rate -->
    <footer class="grade-actions">
      <div class="reply-row">
        <textarea class="reply-input" id="reply" rows="1"
          placeholder="Clarify or add to your answer…"></textarea>
        <button class="reply-send" id="send-btn" aria-label="Send">→</button>
      </div>
      <div class="grade-row" id="grade-row" hidden>
        <button class="grade-btn gb-incorrect" data-grade="incorrect">Incorrect</button>
        <button class="grade-btn gb-partial" data-grade="partial">Partial</button>
        <button class="grade-btn gb-correct" data-grade="correct">Correct</button>
      </div>
    </footer>
  </div>

  <script>
    // --- Minimal LaTeX/markdown renderer, ported from the real client. ---
    function splitMath(source) {
      const segments = []; let text = '';
      const pushText = () => { if (text) segments.push({ kind: 'text', value: text }); text = ''; };
      let i = 0;
      while (i < source.length) {
        const ch = source[i];
        if (ch === '\\' && source[i + 1] === '$') { text += '$'; i += 2; continue; }
        if (ch === '$') {
          const display = source[i + 1] === '$';
          const open = display ? i + 2 : i + 1;
          const close = findClosingDollar(source, open, display);
          if (close === -1) { text += ch; i += 1; continue; }
          pushText();
          segments.push({ kind: 'math', value: source.slice(open, close), display });
          i = display ? close + 2 : close + 1; continue;
        }
        text += ch; i += 1;
      }
      pushText(); return segments;
    }
    function findClosingDollar(source, from, display) {
      for (let j = from; j < source.length; j++) {
        if (source[j] === '\\') { j++; continue; }
        if (source[j] === '$') {
          if (display) { if (source[j + 1] === '$') return j; continue; }
          return j;
        }
      }
      return -1;
    }
    const HTML_ESCAPES = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
    function escapeHtml(t) { return t.replace(/[&<>"']/g, (c) => HTML_ESCAPES[c]); }
    function renderMarkup(text) {
      let html = escapeHtml(text);
      html = html.replace(/\*\*([^]+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*([^*]+?)\*/g, '<em>$1</em>');
      html = html.replace(/\n\n+/g, '<br><br>').replace(/\n/g, '<br>');
      return html;
    }
    function renderContent(host, source) {
      host.innerHTML = '';
      for (const seg of splitMath(source)) {
        if (seg.kind === 'text') {
          const span = document.createElement('span');
          span.innerHTML = renderMarkup(seg.value);
          host.appendChild(span); continue;
        }
        const mathHost = seg.display ? document.createElement('div') : document.createElement('span');
        if (seg.display) mathHost.className = 'qbody-display';
        if (window.katex) katex.render(seg.value, mathHost, { displayMode: seg.display, throwOnError: false });
        else mathHost.textContent = seg.display ? seg.value : '$' + seg.value + '$';
        host.appendChild(mathHost);
      }
    }

    // --- Dummy data: the question + a short graded back-and-forth ---
    const QUESTION =
      'Suppose $a$ and $b$ are real numbers, not both 0. Find real numbers $c$ and $d$ such that\n' +
      '$$1/(a+bi) = c+di.$$';

    // A conversation: user answer → grader (partial) → user clarification →
    // grader (upgraded to correct). `kind` drives bubble styling.
    const TURNS = [
      {
        kind: 'user',
        text: 'Multiply top and bottom by the conjugate: $\\frac{1}{a+bi} = \\frac{a-bi}{a^2+b^2}$, so $c = \\frac{a}{a^2+b^2}$.',
      },
      {
        kind: 'grader',
        grade: 'partial',
        issues: [
          { severity: 'critical', text: 'You found $c$ but never gave $d$. The imaginary part is missing.' },
          { severity: 'minor', text: 'State briefly why $a^2+b^2 \\neq 0$ (since $a,b$ are not both 0).' },
        ],
        reasoning: 'The conjugate method is right and $c=\\frac{a}{a^2+b^2}$ is correct, but a complete answer must also give $d$.',
      },
      {
        kind: 'user',
        text: 'Right — and $d = \\frac{-b}{a^2+b^2}$. Also $a^2+b^2 > 0$ because $a,b$ are not both zero.',
      },
      {
        kind: 'grader',
        grade: 'correct',
        issues: [],
        reasoning: 'Both parts now given: $c=\\frac{a}{a^2+b^2}$, $d=\\frac{-b}{a^2+b^2}$, with the nonzero-denominator justified. Complete.',
      },
    ];

    // The canned grade a faked transcribe/send lands on (photo flow + live send).
    const FAKE_TRANSCRIPTION =
      'By the conjugate, $\\frac{1}{a+bi}=\\frac{a-bi}{a^2+b^2}$, so $c=\\frac{a}{a^2+b^2}$ and $d=\\frac{-b}{a^2+b^2}$.';
    const FAKE_GRADE = {
      kind: 'grader',
      grade: 'correct',
      issues: [],
      reasoning: 'Both real and imaginary parts are given and correct; the conjugate step is sound.',
    };

    // --- Camera / Device icons (from prod ImageSourcePicker) ---
    const CAMERA_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"
         stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 8a2 2 0 0 1 2-2h2l1.2-1.6A2 2 0 0 1 11.8 4h.4a2 2 0 0 1 1.6.8L15 6h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z" />
      <circle cx="12" cy="12.5" r="3.2" />
    </svg>`;
    const DEVICE_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"
         stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="16" rx="2" />
      <circle cx="8.5" cy="9" r="1.6" />
      <path d="m4 18 5-5 3.5 3.5L16 12l4 4" />
    </svg>`;

    // --- DOM handles ---
    const chat = document.getElementById('chat');
    const reply = document.getElementById('reply');
    const gradeRow = document.getElementById('grade-row');

    document.getElementById('q-eyebrow').textContent = 'Griffiths · Chapter 2 · Problem 1';
    renderContent(document.getElementById('q-body'), QUESTION);

    // Mode: ?mode=photo runs the photo→transcribe flow; otherwise the typed
    // demo conversation (matches prod's GradePage `mode` param).
    const mode = new URLSearchParams(location.search).get('mode') === 'photo' ? 'photo' : 'type';

    let stagger = 0;

    // --- Bubble builders (data → DOM, prod vocabulary) ---
    function userBubble(text) {
      const el = document.createElement('div');
      el.className = 'chat-bubble chat-bubble-user qbody animate-in';
      el.style.setProperty('--i', stagger++);
      const body = document.createElement('div');
      renderContent(body, text);
      el.appendChild(body);
      return el;
    }

    function graderBubble(turn) {
      const el = document.createElement('div');
      el.className = 'chat-bubble chat-bubble-agent animate-in';
      el.style.setProperty('--i', stagger++);

      const badge = document.createElement('span');
      badge.className = `grade-badge grade-${turn.grade}`;
      badge.textContent = turn.grade;
      el.appendChild(badge);

      if (turn.issues.length === 0) {
        const ok = document.createElement('div');
        ok.className = 'grade-ok';
        ok.textContent = 'No issues found — looks correct.';
        el.appendChild(ok);
      } else {
        const list = document.createElement('ul');
        list.className = 'issue-list';
        for (const issue of turn.issues) {
          const li = document.createElement('li');
          li.className = `issue issue-${issue.severity}`;
          const sev = document.createElement('span');
          sev.className = 'issue-sev';
          sev.textContent = issue.severity;
          const desc = document.createElement('span');
          desc.className = 'issue-desc qbody';
          renderContent(desc, issue.text);
          li.append(sev, desc);
          list.appendChild(li);
        }
        el.appendChild(list);
      }

      const det = document.createElement('details');
      det.className = 'reasoning';
      const sum = document.createElement('summary');
      sum.textContent = 'Show reasoning';
      const rb = document.createElement('div');
      rb.className = 'reasoning-body qbody';
      renderContent(rb, turn.reasoning);
      det.append(sum, rb);
      el.appendChild(det);

      // The grader's grade becomes the suggested save.
      revealGradeRow(turn.grade);
      return el;
    }

    function thinkingBubble(label) {
      const el = document.createElement('div');
      el.className = 'chat-bubble chat-bubble-agent thinking-bubble animate-in';
      el.style.setProperty('--i', stagger++);
      el.innerHTML =
        '<span class="thinking-dots"><span></span><span></span><span></span></span>' +
        `<span class="thinking-label">${label}</span>`;
      return el;
    }

    function photoBubble(notes) {
      const el = document.createElement('div');
      el.className = 'chat-bubble chat-bubble-user photo-bubble animate-in';
      el.style.setProperty('--i', stagger++);
      // The mock has no real file — show a placeholder thumbnail tile.
      const ph = document.createElement('div');
      ph.className = 'photo-thumb photo-thumb-ph';
      ph.textContent = 'solution photo';
      el.appendChild(ph);
      if (notes) {
        const noteEl = document.createElement('div');
        noteEl.className = 'photo-notes-text';
        noteEl.textContent = notes;
        el.appendChild(noteEl);
      }
      return el;
    }

    function append(node) {
      chat.appendChild(node);
      node.scrollIntoView({ block: 'end', behavior: 'smooth' });
      return node;
    }

    // --- Grade row reveal + suggested marker ---
    function revealGradeRow(suggested) {
      gradeRow.hidden = false;
      gradeRow.querySelectorAll('.grade-btn').forEach((btn) => {
        btn.classList.toggle('suggested', btn.dataset.grade === suggested);
      });
    }

    // --- Fake grade: thinking → canned grader bubble ---
    function fakeGrade(turn) {
      const thinking = append(thinkingBubble('Grading…'));
      setSending(true);
      setTimeout(() => {
        thinking.remove();
        append(graderBubble(turn));
        setSending(false);
      }, 900);
    }

    // Resync stub for compose-while-busy (fully built in the new-UX pass): for
    // now lock both input and send while a grade is in flight, like prod today.
    function setSending(busy) {
      reply.disabled = busy;
      document.getElementById('send-btn').disabled = busy;
    }

    // --- Flows ---
    function startTypedFlow() {
      TURNS.forEach((turn) => {
        append(turn.kind === 'user' ? userBubble(turn.text) : graderBubble(turn));
      });
      reply.focus();
    }

    function startPhotoFlow() {
      // No stashed photo in the mock → show the capture prompt + picker.
      const wrapper = document.createElement('div');
      wrapper.className = 'photo-capture';
      const prompt = document.createElement('div');
      prompt.className = 'photo-capture-prompt';
      prompt.textContent = 'Add a photo of your solution';

      const picker = document.createElement('div');
      picker.className = 'img-src-picker';
      picker.innerHTML =
        `<button class="img-src-btn img-src-camera" type="button">
           <span class="img-src-icon" aria-hidden="true">${CAMERA_ICON}</span>Camera
         </button>
         <button class="img-src-btn img-src-device" type="button">
           <span class="img-src-icon" aria-hidden="true">${DEVICE_ICON}</span>Device
         </button>`;
      picker.querySelectorAll('.img-src-btn').forEach((btn) => {
        btn.addEventListener('click', () => { wrapper.remove(); transcribePhoto(); });
      });

      wrapper.append(prompt, picker);
      append(wrapper);
    }

    // Photo → transcribe: show the photo bubble, fake a transcribe pause, then
    // (prod today) auto-hand the transcription to the grader as a user turn.
    function transcribePhoto() {
      append(photoBubble(''));
      const thinking = append(thinkingBubble('Transcribing…'));
      setSending(true);
      setTimeout(() => {
        thinking.remove();
        setSending(false);
        append(userBubble(FAKE_TRANSCRIPTION));
        fakeGrade(FAKE_GRADE);
      }, 1100);
    }

    // --- Interactions ---
    function nextItem() {
      // Real app: advance to the next pending lesson/repetition in the session
      // loop. Mock: hop back to learn, which picks the next due question.
      window.location.href = 'learn.html';
    }

    document.getElementById('back-btn').addEventListener('click', () => { window.location.href = 'learn.html'; });

    // Skip: v0 advances to the next item without persisting anything (the
    // skipped question reappears next session). Mock just advances.
    document.getElementById('skip-btn').addEventListener('click', nextItem);

    // Send reply: post the user's clarification as a chat turn and re-grade
    // against it. Mock appends the bubble then fakes a grader response.
    function sendReply() {
      const text = reply.value.trim();
      if (!text) return;
      append(userBubble(text));
      reply.value = '';
      reply.style.height = 'auto';
      fakeGrade(FAKE_GRADE);
    }
    document.getElementById('send-btn').addEventListener('click', sendReply);
    reply.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendReply(); }
    });

    // Save grade: record the attempt with the chosen grade, then advance.
    gradeRow.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-grade]');
      if (!btn) return;
      // → api.saveAttempt({ questionId, grade: btn.dataset.grade, transcript })
      nextItem();
    });

    // Auto-grow the reply textarea a little as you type.
    reply.addEventListener('input', () => {
      reply.style.height = 'auto';
      reply.style.height = Math.min(reply.scrollHeight, 120) + 'px';
    });

    // --- Boot ---
    if (mode === 'photo') startPhotoFlow();
    else startTypedFlow();
  </script>
  <script src="footer.js" defer></script>
</body>
</html>
