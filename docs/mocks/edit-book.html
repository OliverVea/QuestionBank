<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <!-- PWA: installable, runs in its own window (standalone). -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#f9ae60" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="QuestionBank" />
  <title>Question Bank — Edit a Book Mock</title>
  <link rel="stylesheet" href="mocks.css" />
  <!-- Reuses the add-book layout/stylesheet; only labels + prefill differ. -->
  <link rel="stylesheet" href="add-book.css" />
  <!-- KaTeX vendored locally (served by `npm run mocks`); no network needed. -->
  <link rel="stylesheet" href="vendor/katex/katex.min.css" />
  <script src="vendor/katex/katex.min.js"></script>
  <!-- Shared problems-list component (defines window.initProblemsList). -->
  <script src="problems-list.js"></script>
</head>
<body class="anim-cascade">
  <div class="app">
    <!-- Top bar: Back returns to the manage-books list. -->
    <header class="topbar">
      <button class="topbar-btn" id="back-btn">
        <span aria-hidden="true">←</span> Back
      </button>
    </header>

    <!-- Same form as add-book, pre-populated for an existing book. The ISBN
         field is kept as a re-lookup shortcut to refresh metadata/chapters. -->
    <form class="add-stage" id="book-form" autocomplete="off">
      <h1 class="add-title animate-in" style="--i: 0">Edit book</h1>

      <!-- ISBN: re-run a lookup to refresh the fields below. -->
      <label class="field animate-in" style="--i: 1">
        <span class="field-lbl">ISBN <span class="field-opt">(re-look up to refresh details)</span></span>
        <span class="isbn-row">
          <input class="field-in isbn-input" id="isbn-input" inputmode="numeric"
                 placeholder="e.g. 9781107179868" aria-label="ISBN" />
          <button class="isbn-scan" id="isbn-scan" type="button"
                  aria-label="Scan barcode" title="Scan barcode">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"
                 stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <!-- camera-style framing corners -->
              <path d="M3 7V5a2 2 0 0 1 2-2h2" />
              <path d="M17 3h2a2 2 0 0 1 2 2v2" />
              <path d="M21 17v2a2 2 0 0 1-2 2h-2" />
              <path d="M7 21H5a2 2 0 0 1-2-2v-2" />
              <!-- barcode bars -->
              <path d="M7 8v8" /><path d="M10 8v8" /><path d="M13 8v8" /><path d="M17 8v8" />
            </svg>
          </button>
          <button class="isbn-go" id="isbn-go" type="button">Look up</button>
        </span>
      </label>

      <!-- Status line: spinner / not-found note while looking up -->
      <div class="lookup-status" id="lookup-status" hidden></div>

      <!-- Cover + core details -->
      <div class="details-row animate-in" style="--i: 2">
        <div class="cover-slot" id="cover-slot"><!-- cover or fallback --></div>
        <div class="details-fields">
          <label class="field">
            <span class="field-lbl">Title</span>
            <input class="field-in" id="f-title" placeholder="Book title" required />
          </label>
          <label class="field">
            <span class="field-lbl">Author</span>
            <input class="field-in" id="f-author" placeholder="Author" />
          </label>
          <div class="field-meta" id="f-meta" hidden><!-- publisher · year --></div>
        </div>
      </div>

      <label class="field field-block animate-in" style="--i: 3">
        <span class="field-lbl">Learning goal <span class="field-opt">(optional)</span></span>
        <textarea class="field-in" id="f-goal" rows="2"
          placeholder="What do you want to get out of this book?"></textarea>
      </label>

      <!-- Problems: the book's flat ordered list. Rendered LaTeX, tap to edit,
           drag to reorder, trash to delete. Behavior in problems-list.js. -->
      <div class="problems animate-in" style="--i: 4">
        <div class="problems-head">
          <h2>Problems</h2>
        </div>

        <!-- Scan a page of problems: the primary way to populate the list, so it
             leads. Opens the OS camera/photo picker; on a chosen photo we hand
             off to the scan-problems chat to extract problems and propose
             additions. The input is hidden; the button triggers it. -->
        <button class="scan-problems" id="scan-problems" type="button">
          <span class="cam" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 8a2 2 0 0 1 2-2h2l1.2-1.6A2 2 0 0 1 11.8 4h.4a2 2 0 0 1 1.6.8L15 6h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z" />
              <circle cx="12" cy="12.5" r="3.2" />
            </svg>
          </span>
          Scan a problems page
        </button>
        <input id="scan-input" type="file" accept="image/*" capture="environment" hidden />

        <ol class="problem-list" id="problem-list"><!-- rows injected --></ol>
        <button class="add-problem" id="add-problem" type="button">
          <span class="plus" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 5v14" /><path d="M5 12h14" />
            </svg>
          </span>
          Add a problem
        </button>
      </div>
    </form>

    <!-- Sticky bottom action; enabled while there's a title (pre-filled here). -->
    <footer class="add-actions">
      <button class="primary-btn" id="save-btn" type="submit" form="book-form">
        Save changes
        <span class="sb-count" id="sb-count"></span>
      </button>
    </footer>
  </div>

  <script>
    // ---- The book being edited --------------------------------------------
    // In the real client the book (title/author/goal/isbn + its ordered
    // problems) is loaded from the server by id. This mock fakes that with a
    // small table keyed by ISBN; the manage screen deep-links here with
    // ?isbn=NNN. Defaults to the first entry so the page is viewable standalone.
    // Each problem is { label, latex } — label null means "auto-number".
    const BOOKS = {
      '9781107179868': {
        title: 'Introduction to Quantum Mechanics',
        author: 'David J. Griffiths',
        publisher: 'Cambridge University Press', year: '2018',
        goal: 'Build intuition for the formalism and solve the standard problems.',
        problems: [
          { label: '1.A.1', latex: 'Normalize the wave function $\\Psi(x,0)=A\\,e^{-\\lambda|x|}$ and find $A$.' },
          { label: '1.A.2', latex: 'For $\\Psi(x,t)$, show that $\\frac{d\\langle x\\rangle}{dt}=\\frac{\\langle p\\rangle}{m}$.' },
          { label: '1.B.1', latex: 'Solve the time-independent Schrödinger equation for the infinite square well: $$-\\frac{\\hbar^2}{2m}\\psi\'\' = E\\psi.$$' },
          { label: null, latex: 'State the uncertainty principle for position and momentum.' },
        ],
      },
      '9780914098911': {
        title: 'Calculus', author: 'Michael Spivak',
        publisher: 'Publish or Perish', year: '2008', goal: '',
        problems: [
          { label: null, latex: 'Prove that $|a+b|\\le|a|+|b|$ for all real $a,b$.' },
          { label: null, latex: 'Show that $\\lim_{x\\to 0}\\frac{\\sin x}{x}=1$.' },
        ],
      },
      '9783319110790': {
        title: 'Linear Algebra Done Right', author: 'Sheldon Axler',
        publisher: 'Springer', year: '2015', goal: '',
        problems: [
          { label: null, latex: 'Show that a list of vectors $(v_1,\\dots,v_n)$ is linearly independent iff each $v_j$ is not in $\\operatorname{span}(v_1,\\dots,v_{j-1})$.' },
        ],
      },
    };

    // ---- ISBN re-lookup records (what the SERVER would return) ------------
    // Re-running a lookup refreshes the book's metadata (title/author/year)
    // from the catalog. Problems are authored by the user, not sourced here.
    const SAMPLES = {
      '9781107179868': {
        title: 'Introduction to Quantum Mechanics', author: 'David J. Griffiths',
        publisher: 'Cambridge University Press', year: '2018',
      },
      '9780914098911': {
        title: 'Calculus', author: 'Michael Spivak',
        publisher: 'Publish or Perish', year: '2008',
      },
      '9783319110790': {
        title: 'Linear Algebra Done Right', author: 'Sheldon Axler',
        publisher: 'Springer', year: '2015',
      },
    };

    // ---- Cover resolution (ported from add-book.html) ---------------------
    const COVER_CACHE_PREFIX = 'qb-cover:';
    const ORANGE_STEPS = ['--orange-200', '--orange-300', '--orange-400', '--orange-500'];
    function makeFallback(title, color) {
      const tile = document.createElement('span');
      tile.className = 'cover-fallback';
      tile.style.background = color;
      const inner = document.createElement('span');
      inner.textContent = title || '—';
      tile.appendChild(inner);
      return tile;
    }
    const COVER_COLOR = `var(${ORANGE_STEPS[0]})`;
    async function resolveCover(isbn) {
      if (!isbn) return null;
      const key = COVER_CACHE_PREFIX + isbn;
      const cached = localStorage.getItem(key);
      if (cached) return cached;
      const url = `https://covers.openlibrary.org/b/isbn/${isbn}-M.jpg?default=false`;
      try {
        const res = await fetch(url);
        if (!res.ok) return null;
        const blob = await res.blob();
        if (blob.size < 100) return null;
        const dataUrl = await new Promise((resolve, reject) => {
          const fr = new FileReader();
          fr.onload = () => resolve(fr.result);
          fr.onerror = reject;
          fr.readAsDataURL(blob);
        });
        try { localStorage.setItem(key, dataUrl); } catch { /* quota */ }
        return dataUrl;
      } catch { return null; }
    }

    // ---- DOM refs ----------------------------------------------------------
    const form = document.getElementById('book-form');
    const isbnInput = document.getElementById('isbn-input');
    const scanBtn = document.getElementById('isbn-scan');
    const goBtn = document.getElementById('isbn-go');
    const status = document.getElementById('lookup-status');
    const coverSlot = document.getElementById('cover-slot');
    const fTitle = document.getElementById('f-title');
    const fAuthor = document.getElementById('f-author');
    const fGoal = document.getElementById('f-goal');
    const fMeta = document.getElementById('f-meta');
    const problemListHost = document.getElementById('problem-list');
    const addProblemBtn = document.getElementById('add-problem');
    const saveBtn = document.getElementById('save-btn');
    const sbCount = document.getElementById('sb-count');

    // ---- Dirty tracking + unsaved-changes guard ---------------------------
    let dirty = false;
    function markDirty() {
      dirty = true;
      syncCount();
    }
    function syncCount() {
      const n = problems ? problems.getProblems().length : 0;
      sbCount.textContent = n ? `· ${n} problem${n === 1 ? '' : 's'}` : '';
    }
    // Any metadata edit also dirties the form.
    [fTitle, fAuthor, fGoal, isbnInput].forEach((el) =>
      el.addEventListener('input', markDirty));
    window.addEventListener('beforeunload', (e) => {
      if (!dirty) return;
      e.preventDefault();
      e.returnValue = '';   // browsers show their own generic warning
    });
    // Our own in-app nav (Back) should respect the guard too.
    function leave(href) {
      if (dirty && !confirm('You have unsaved changes. Leave without saving?')) return;
      dirty = false;        // disarm the beforeunload guard for this navigation
      window.location.href = href;
    }

    // ---- Cover preview reflects the current title/ISBN --------------------
    function refreshCover() {
      coverSlot.innerHTML = '';
      const fb = makeFallback(fTitle.value.trim(), COVER_COLOR);
      coverSlot.appendChild(fb);
      const isbn = isbnInput.value.replace(/[^0-9Xx]/g, '');
      if (!isbn) return;
      void resolveCover(isbn).then((dataUrl) => {
        if (!dataUrl || !coverSlot.contains(fb)) return;
        const img = document.createElement('img');
        img.className = 'cover-img';
        img.alt = `${fTitle.value.trim()} cover`;
        img.src = dataUrl;
        fb.replaceWith(img);
      });
    }

    // ---- Title gates the save button --------------------------------------
    function syncSave() { saveBtn.disabled = fTitle.value.trim() === ''; }
    fTitle.addEventListener('input', () => { syncSave(); refreshCover(); });

    // ---- ISBN re-lookup → refresh the form --------------------------------
    function setStatus(html, kind) {
      status.hidden = false;
      status.className = 'lookup-status' + (kind ? ' ' + kind : '');
      status.innerHTML = html;
    }
    function clearStatus() { status.hidden = true; status.innerHTML = ''; }

    async function lookup() {
      const isbn = isbnInput.value.replace(/[^0-9Xx]/g, '');
      if (!isbn) { isbnInput.focus(); return; }
      goBtn.disabled = true;
      setStatus('<span class="spinner" aria-hidden="true"></span> Looking up ' + isbn + '…', 'loading');
      const rec = SAMPLES[isbn];
      if (rec) {
        fTitle.value = rec.title || fTitle.value;
        fAuthor.value = rec.author || fAuthor.value;
        const meta = [rec.publisher, rec.year].filter(Boolean).join(' · ');
        fMeta.textContent = meta;
        fMeta.hidden = !meta;
        clearStatus();
      } else {
        setStatus('No match for that ISBN — edit the details yourself.', 'warn');
        fMeta.hidden = true;
      }
      refreshCover();
      syncSave();
      markDirty();
      goBtn.disabled = false;
    }
    goBtn.addEventListener('click', lookup);
    isbnInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); void lookup(); }
    });

    // ---- Scan barcode (faked, like add-book) ------------------------------
    scanBtn.addEventListener('click', async () => {
      scanBtn.disabled = true;
      setStatus('<span class="spinner" aria-hidden="true"></span> Scanning barcode…', 'loading');
      const codes = Object.keys(SAMPLES);
      const isbn = codes[isbnInput.value.length % codes.length];
      isbnInput.value = isbn;
      scanBtn.disabled = false;
      void lookup();
    });

    // ---- Submit (save) -----------------------------------------------------
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      if (fTitle.value.trim() === '') return;
      const list = problems.getProblems();
      alert(
        '→ save changes: ' + fTitle.value.trim() +
        (fAuthor.value.trim() ? ' — ' + fAuthor.value.trim() : '') +
        '\n' + list.length + ' problem(s)',
      );
      dirty = false;        // saved → disarm the unsaved-changes guard
      window.location.href = 'manage-books.html';
    });
    document.getElementById('back-btn').addEventListener('click',
      () => leave('manage-books.html'));

    // ---- Pre-populate from the chosen book --------------------------------
    // ?isbn=NNN selects the book; default to the first so it's viewable alone.
    const wantedIsbn = new URLSearchParams(location.search).get('isbn');
    const isbn = BOOKS[wantedIsbn] ? wantedIsbn : Object.keys(BOOKS)[0];
    const book = BOOKS[isbn];

    isbnInput.value = isbn;
    fTitle.value = book.title;
    fAuthor.value = book.author;
    fGoal.value = book.goal || '';
    const meta = [book.publisher, book.year].filter(Boolean).join(' · ');
    fMeta.textContent = meta;
    fMeta.hidden = !meta;

    // Mount the shared problems list. Edits/adds/deletes/reorders dirty the form.
    const problems = initProblemsList({
      host: problemListHost,
      addButton: addProblemBtn,
      problems: book.problems || [],
      onChange: markDirty,
    });

    // ---- Scan a problems page → hand off to the scan-problems chat ----------
    // Mock handoff: stash the chosen photo (as a data URL) in sessionStorage,
    // then navigate to the scan screen. The scan screen reads it back, runs the
    // (faked) agent, and writes any accepted problems to a return slot which we
    // drain on load (see below). Real client: this is a server-backed extract +
    // chat flow; the mock just fakes the round-trip.
    const SCAN_PHOTO_KEY = 'qb-scan-photo';
    const SCAN_RETURN_KEY = 'qb-scan-accepted';
    const scanBtnEl = document.getElementById('scan-problems');
    const scanInput = document.getElementById('scan-input');
    scanBtnEl.addEventListener('click', () => scanInput.click());
    scanInput.addEventListener('change', () => {
      const file = scanInput.files && scanInput.files[0];
      if (!file) return;
      const fr = new FileReader();
      fr.onload = () => {
        try { sessionStorage.setItem(SCAN_PHOTO_KEY, fr.result); } catch { /* quota */ }
        // Leaving for the scan side-trip — disarm the unsaved-changes guard so
        // the in-flight edits aren't lost to a navigation prompt; we come right
        // back to this same book.
        dirty = false;
        window.location.href = 'scan-problems.html?isbn=' + encodeURIComponent(isbn);
      };
      fr.readAsDataURL(file);
    });

    // On return from the scan screen: drain any accepted problems and append
    // them, highlighting + scrolling the first new row into view.
    function drainScanReturn() {
      let payload;
      try { payload = sessionStorage.getItem(SCAN_RETURN_KEY); } catch { return; }
      if (!payload) return;
      sessionStorage.removeItem(SCAN_RETURN_KEY);
      let accepted;
      try { accepted = JSON.parse(payload); } catch { return; }
      if (!Array.isArray(accepted) || accepted.length === 0) return;
      let firstNew = null;
      accepted.forEach((p) => {
        const r = problems.addRow({ label: p.label ?? null, latex: p.latex || '' });
        r.el.classList.add('pr-new');
        if (!firstNew) firstNew = r.el;
      });
      markDirty();
      if (firstNew) {
        firstNew.scrollIntoView({ block: 'center', behavior: 'smooth' });
        // Let the highlight fade after a beat.
        setTimeout(() => {
          document.querySelectorAll('.pr-new').forEach((el) => el.classList.remove('pr-new'));
        }, 2400);
      }
    }

    refreshCover();
    syncCount();
    syncSave();
    drainScanReturn();      // pick up problems accepted on the scan screen
    dirty = false;          // prefill itself is not a user change
  </script>
  <script src="footer.js" defer></script>
</body>
</html>
