<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <!-- PWA: installable, runs in its own window (standalone). -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#f9ae60" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="QuestionBank" />
  <title>Question Bank — Book View Mock</title>
  <link rel="stylesheet" href="vendor/katex/katex.min.css" />
  <link rel="stylesheet" href="mocks.css" />
  <link rel="stylesheet" href="view-book.css" />
  <script src="vendor/katex/katex.min.js"></script>
  <!-- Shared badge + CI-strip helpers (window.attemptSummary). -->
  <script src="attempt-summary.js"></script>
</head>
<body class="anim-cascade">
  <div class="app">
    <!-- Top bar: Back returns to the library. -->
    <header class="topbar">
      <button class="topbar-btn" id="back-btn">
        <span aria-hidden="true">←</span> Library
      </button>
    </header>

    <div class="vb-scroll">
      <!-- Book header -->
      <section class="vb-head animate-in" style="--i: 0">
        <div id="cover-slot"><!-- cover or fallback --></div>
        <div>
          <div class="vb-title" id="b-title">Book</div>
          <div class="vb-author" id="b-author"></div>
          <div class="vb-meta" id="b-meta" hidden></div>
        </div>
      </section>

      <div class="vb-listhead animate-in" style="--i: 1">
        <h2>Problems</h2>
        <span class="vb-n" id="b-count"></span>
      </div>

      <ol class="vb-list" id="problem-list"><!-- rows injected --></ol>
    </div>
  </div>

  <script>
    // --- Minimal LaTeX renderer (ported from grade.html / problems-list.js) --
    function findClosingDollar(source, from, display) {
      for (let j = from; j < source.length; j++) {
        if (source[j] === '\\') { j++; continue; }
        if (source[j] === '$') {
          if (display) { if (source[j + 1] === '$') return j; continue; }
          return j;
        }
      }
      return -1;
    }
    function splitMath(source) {
      const segments = []; let text = '';
      const pushText = () => { if (text) segments.push({ kind: 'text', value: text }); text = ''; };
      let i = 0;
      while (i < source.length) {
        const ch = source[i];
        if (ch === '\\' && source[i + 1] === '$') { text += '$'; i += 2; continue; }
        if (ch === '$') {
          const display = source[i + 1] === '$';
          const open = display ? i + 2 : i + 1;
          const close = findClosingDollar(source, open, display);
          if (close === -1) { text += ch; i += 1; continue; }
          pushText();
          segments.push({ kind: 'math', value: source.slice(open, close), display });
          i = display ? close + 2 : close + 1; continue;
        }
        text += ch; i += 1;
      }
      pushText(); return segments;
    }
    const HTML_ESCAPES = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
    const escapeHtml = (t) => t.replace(/[&<>"']/g, (c) => HTML_ESCAPES[c]);
    function renderLatex(host, source) {
      host.innerHTML = '';
      for (const seg of splitMath(source)) {
        if (seg.kind === 'text') {
          const span = document.createElement('span');
          span.innerHTML = escapeHtml(seg.value).replace(/\n/g, ' ');
          host.appendChild(span); continue;
        }
        const mathHost = seg.display ? document.createElement('span') : document.createElement('span');
        if (window.katex) katex.render(seg.value, mathHost, { displayMode: false, throwOnError: false });
        else mathHost.textContent = '$' + seg.value + '$';
        host.appendChild(mathHost);
      }
    }

    // --- Seed data ----------------------------------------------------------
    // Standalone mock: carries its own books. Same shape as edit-book, plus an
    // `attempts` array per problem (oldest first) and an optional `status`
    // pinning readiness. ?isbn=NNN picks the book; defaults to the first.
    const BOOKS = {
      '9781107179868': {
        title: 'Introduction to Quantum Mechanics', author: 'David J. Griffiths',
        publisher: 'Cambridge University Press', year: '2018',
        problems: [
          {
            label: '1.A.1', status: 'ready',
            latex: 'Normalize the wave function $\\Psi(x,0)=A\\,e^{-\\lambda|x|}$ and find $A$.',
            attempts: [
              { grade: 'incorrect', daysAgo: 9, answer: 'Set $\\int|\\Psi|^2=1$ but I integrated $e^{-\\lambda x}$ over all $x$ and got a divergent integral.', reasoning: 'The integrand is $e^{-2\\lambda|x|}$, not $e^{-2\\lambda x}$ — the absolute value matters. Split the integral at 0.' },
              { grade: 'partial', daysAgo: 5, answer: '$\\int_{-\\infty}^{\\infty}A^2 e^{-2\\lambda|x|}\\,dx = \\frac{A^2}{\\lambda}=1$, so $A=\\sqrt{\\lambda}$.', reasoning: 'Right value of $A$, but make the factor-of-2 step explicit: $2\\int_0^\\infty A^2 e^{-2\\lambda x}\\,dx=\\frac{A^2}{\\lambda}$.' },
              { grade: 'incorrect', daysAgo: 1, answer: '$A=\\lambda$.', reasoning: 'That drops the square root. From $A^2/\\lambda=1$ you get $A=\\sqrt{\\lambda}$.' },
            ],
          },
          {
            label: '1.A.2', status: 'waiting', nextReviewInDays: 3,
            latex: 'For $\\Psi(x,t)$, show that $\\frac{d\\langle x\\rangle}{dt}=\\frac{\\langle p\\rangle}{m}$.',
            attempts: [
              { grade: 'partial', daysAgo: 14, answer: 'Differentiated under the integral but forgot the boundary terms vanish.', reasoning: 'The argument needs $\\Psi\\to 0$ at $\\pm\\infty$ to kill the boundary term — state it.' },
              { grade: 'correct', daysAgo: 6, answer: 'Used the Schrödinger equation to replace $\\partial_t|\\Psi|^2$, integrated by parts twice, boundary terms vanish since $\\Psi\\to0$, giving $\\frac{\\langle p\\rangle}{m}$.', reasoning: 'Complete and rigorous. Boundary terms justified.' },
              { grade: 'correct', daysAgo: 1, answer: 'Same derivation, cleaner — one integration by parts after writing the probability current.', reasoning: 'Correct; the probability-current framing is the slick way.' },
            ],
          },
          {
            label: '1.B.1', status: 'finalized',
            latex: 'Solve the time-independent Schrödinger equation for the infinite square well: $$-\\frac{\\hbar^2}{2m}\\psi\'\' = E\\psi.$$',
            attempts: [
              { grade: 'correct', daysAgo: 30, answer: '$\\psi_n(x)=\\sqrt{2/a}\\,\\sin(n\\pi x/a)$, $E_n=\\frac{n^2\\pi^2\\hbar^2}{2ma^2}$.', reasoning: 'Correct eigenfunctions and spectrum, normalized.' },
              { grade: 'correct', daysAgo: 7, answer: 'Re-derived the same; applied boundary conditions $\\psi(0)=\\psi(a)=0$ to quantize $k$.', reasoning: 'Solid, boundary conditions handled correctly.' },
            ],
          },
          {
            label: '1.B.2', status: 'waiting', nextReviewInDays: 12,
            latex: 'For the infinite square well, compute $\\langle x\\rangle$ and $\\langle x^2\\rangle$ in the $n$th stationary state.',
            attempts: [
              { grade: 'partial', daysAgo: 18, answer: '$\\langle x\\rangle = a/2$ by symmetry; got stuck on $\\langle x^2\\rangle$.', reasoning: 'Symmetry argument for $\\langle x\\rangle$ is right. For $\\langle x^2\\rangle$ use $\\int_0^a x^2\\sin^2(n\\pi x/a)\\,dx$.' },
              { grade: 'correct', daysAgo: 4, answer: '$\\langle x^2\\rangle = a^2\\left(\\frac{1}{3}-\\frac{1}{2n^2\\pi^2}\\right)$.', reasoning: 'Correct; the $1/n^2$ term is the quantum correction.' },
            ],
          },
          {
            label: '1.C.1', status: 'ready',
            latex: 'Find the allowed energies of the harmonic oscillator using the ladder-operator method.',
            attempts: [],
          },
          {
            label: '1.C.2', status: 'ready',
            latex: 'Construct the first three stationary states $\\psi_0,\\psi_1,\\psi_2$ of the harmonic oscillator.',
            attempts: [
              { grade: 'incorrect', daysAgo: 2, answer: 'Applied $a_+$ to $\\psi_0$ but dropped the normalization constant each time.', reasoning: 'Each $a_+$ application brings a factor $\\sqrt{n+1}$ — track it so the states stay normalized.' },
            ],
          },
          {
            label: '2.A.1', status: 'waiting', nextReviewInDays: 6,
            latex: 'A free particle has $\\Psi(x,0)=Ae^{-ax^2}$. Find $\\Phi(k)$ and $\\Psi(x,t)$.',
            attempts: [
              { grade: 'correct', daysAgo: 11, answer: 'Gaussian integral gives $\\Phi(k)=(2\\pi a)^{-1/4}\\,(1/\\sqrt{2a})\\,e^{-k^2/4a}$; propagated each mode by $e^{-i\\hbar k^2 t/2m}$.', reasoning: 'Correct; the spreading wave packet is the key result.' },
            ],
          },
          {
            label: '2.A.2', status: 'ready',
            latex: 'Show that the Gaussian wave packet spreads in time, and find the width $w(t)$.',
            attempts: [],
          },
          {
            label: '2.B.1', status: 'finalized',
            latex: 'Solve the delta-function potential $V(x)=-\\alpha\\,\\delta(x)$ for its single bound state.',
            attempts: [
              { grade: 'correct', daysAgo: 40, answer: '$\\psi(x)=\\sqrt{m\\alpha}/\\hbar\\;e^{-m\\alpha|x|/\\hbar^2}$, $E=-m\\alpha^2/2\\hbar^2$.', reasoning: 'Correct; the discontinuity in $\\psi\'$ at the origin gives the binding energy.' },
              { grade: 'correct', daysAgo: 12, answer: 'Re-derived using the jump condition $\\Delta\\psi\' = -2m\\alpha\\psi(0)/\\hbar^2$.', reasoning: 'Clean re-derivation; jump condition applied correctly.' },
            ],
          },
          {
            label: '2.3', status: 'ready',
            latex: 'A particle of energy $E$ encounters a step potential of height $V_0<E$. Compute the reflection coefficient $R$.',
            attempts: [
              { grade: 'partial', daysAgo: 3, answer: 'Got $R=\\left(\\frac{k_1-k_2}{k_1+k_2}\\right)^2$ but used probability instead of flux.', reasoning: 'Right final form, but justify it with the probability current, not $|B/A|^2$ alone — they coincide here only because the step is real.' },
            ],
          },
          {
            label: '3.A.1', status: 'ready',
            latex: 'Show that the position and momentum operators satisfy $[\\hat{x},\\hat{p}]=i\\hbar$.',
            attempts: [],
          },
          {
            label: null, status: 'ready',
            latex: 'State the uncertainty principle for position and momentum, and sketch the argument from the Schwarz inequality.',
            attempts: [],
          },
        ],
      },
    };

    // --- Cover resolution (ported from edit-book.html) ----------------------
    const COVER_CACHE_PREFIX = 'qb-cover:';
    const ORANGE_STEPS = ['--orange-200', '--orange-300', '--orange-400', '--orange-500'];
    const COVER_COLOR = `var(${ORANGE_STEPS[0]})`;
    function makeFallback(title) {
      const tile = document.createElement('span');
      tile.className = 'vb-cover-fallback';
      tile.style.background = COVER_COLOR;
      const inner = document.createElement('span');
      inner.textContent = title || '—';
      tile.appendChild(inner);
      return tile;
    }
    async function resolveCover(isbn) {
      if (!isbn) return null;
      const key = COVER_CACHE_PREFIX + isbn;
      const cached = localStorage.getItem(key);
      if (cached) return cached;
      const url = `https://covers.openlibrary.org/b/isbn/${isbn}-M.jpg?default=false`;
      try {
        const res = await fetch(url);
        if (!res.ok) return null;
        const blob = await res.blob();
        if (blob.size < 100) return null;
        const dataUrl = await new Promise((resolve, reject) => {
          const fr = new FileReader();
          fr.onload = () => resolve(fr.result);
          fr.onerror = reject;
          fr.readAsDataURL(blob);
        });
        try { localStorage.setItem(key, dataUrl); } catch { /* quota */ }
        return dataUrl;
      } catch { return null; }
    }

    // --- Resolve the book from the query ------------------------------------
    const params = new URLSearchParams(location.search);
    const wantedIsbn = params.get('isbn');
    const isbn = BOOKS[wantedIsbn] ? wantedIsbn : Object.keys(BOOKS)[0];
    const book = BOOKS[isbn];

    document.getElementById('back-btn').addEventListener('click', () => {
      window.location.href = 'index.html';
    });

    // --- Header -------------------------------------------------------------
    document.getElementById('b-title').textContent = book.title;
    document.getElementById('b-author').textContent = book.author || '';
    const meta = [book.publisher, book.year].filter(Boolean).join(' · ');
    const metaEl = document.getElementById('b-meta');
    metaEl.textContent = meta;
    metaEl.hidden = !meta;

    const coverSlot = document.getElementById('cover-slot');
    const fb = makeFallback(book.title);
    coverSlot.appendChild(fb);
    void resolveCover(isbn).then((dataUrl) => {
      if (!dataUrl || !coverSlot.contains(fb)) return;
      const img = document.createElement('img');
      img.className = 'vb-cover';
      img.alt = `${book.title} cover`;
      img.src = dataUrl;
      fb.replaceWith(img);
    });

    // --- Problem rows, grouped by path (two levels: chapter ▸ section) ------
    // The dotted path label (`1.A.3`) IS the organizing concept. We fan it out
    // TWO levels: chapter (first segment) → its subsections (`A`, `B`, …) AND
    // the problems that live directly at the chapter (`2.3`). `1.A.1` nests
    // under chapter 1 ▸ section A; `2.3` is a direct child of chapter 2. Within
    // a chapter, entries sort alphabetically by their next segment, with the
    // chapter's loose direct-problems FIRST, then the lettered subsections.
    // Headers fan out the path and toggle expand/collapse — they NEVER navigate.
    // Two grouping levels only (no deeper recursion). Collapse state is
    // in-memory, default expanded. Unlabelled problems fall into an "Ungrouped"
    // chapter, ordered last.
    const listHost = document.getElementById('problem-list');
    const problems = book.problems || [];
    document.getElementById('b-count').textContent =
      problems.length + ' problem' + (problems.length === 1 ? '' : 's');

    // Split a label into { segments, terminal } — the breadcrumb prefix and the
    // final "Problem N". `1.A.3` → prefix [1, A], terminal '3'. A label that is
    // just `3` (no prefix) → prefix [], terminal '3'. No label → ungrouped.
    function splitLabel(label) {
      if (label == null || label === '') return null;
      const parts = String(label).split('.');
      const chapter = parts[0];
      if (parts.length >= 3) return { chapter, section: parts[1], terminal: parts.slice(2).join('.') };
      if (parts.length === 2) return { chapter, section: null, terminal: parts[1] };
      return { chapter, section: null, terminal: null };
    }
    const fullLabel = (p, i) => (p.label != null && p.label !== '' ? String(p.label) : String(i + 1));

    // Build the chapter buckets, preserving first-seen order (the seed is
    // already in (path, createdAt) order) so problems stay path-ordered.
    const UNGROUPED = '￿';   // sorts after any real chapter
    const chapterMap = new Map();
    const chapterFor = (key, name) => {
      if (!chapterMap.has(key)) {
        chapterMap.set(key, { name, direct: [], sections: new Map() });
      }
      return chapterMap.get(key);
    };
    problems.forEach((p, i) => {
      const split = splitLabel(p.label);
      const entry = { p, i };
      if (!split) { chapterFor(UNGROUPED, null).direct.push(entry); return; }
      const ch = chapterFor(split.chapter, split.chapter);
      if (split.section == null) ch.direct.push(entry);
      else {
        if (!ch.sections.has(split.section)) ch.sections.set(split.section, []);
        ch.sections.get(split.section).push(entry);
      }
    });
    // Chapters in path order (Ungrouped last via the sentinel key).
    const chapters = [...chapterMap.entries()]
      .sort(([a], [b]) => a.localeCompare(b, undefined, { numeric: true }))
      .map(([, c]) => c);

    let stagger = 2;   // continues the header's animate-in cascade (head=0, listhead=1)

    // Build a collapsible header (breadcrumb + count + caret). `segments` is the
    // path fanned out (`['2','A']`); levels read quieter with depth.
    function makeHeader(segments, isUngrouped, n) {
      const header = document.createElement('button');
      header.type = 'button';
      header.className = 'vb-group-head animate-in';
      header.style.setProperty('--i', stagger++);
      header.setAttribute('aria-expanded', 'true');

      const crumb = document.createElement('span');
      crumb.className = 'vb-crumb';
      if (isUngrouped) {
        const segEl = document.createElement('span');
        segEl.className = 'vb-crumb-seg lvl-other';
        segEl.textContent = 'Ungrouped';
        crumb.appendChild(segEl);
      } else {
        segments.forEach((seg, si) => {
          if (si > 0) {
            const sep = document.createElement('span');
            sep.className = 'vb-crumb-sep';
            sep.setAttribute('aria-hidden', 'true');
            sep.textContent = '›';   // ›
            crumb.appendChild(sep);
          }
          const segEl = document.createElement('span');
          // Depth class lets each level read distinct (chapter strongest).
          segEl.className = 'vb-crumb-seg lvl-' + Math.min(si, 3);
          segEl.textContent = seg;
          crumb.appendChild(segEl);
        });
      }

      const count = document.createElement('span');
      count.className = 'vb-group-n';
      count.textContent = n;

      const caret = document.createElement('span');
      caret.className = 'vb-group-caret';
      caret.setAttribute('aria-hidden', 'true');
      caret.textContent = '⌄';   // ⌄

      header.append(crumb, count, caret);
      return header;
    }

    // Wire a header to expand/collapse its body. In-memory only.
    function wireToggle(header, groupEl) {
      header.addEventListener('click', () => {
        const collapsed = groupEl.classList.toggle('collapsed');
        header.setAttribute('aria-expanded', String(!collapsed));
      });
    }

    // Build one problem row. The label chip is tinted by mastery (how
    // established); the bottom-right column shows readiness/timing.
    function makeRow(p, i) {
      const row = document.createElement('a');
      row.className = 'vb-row';
      row.href = 'attempts-filled.html?isbn=' + encodeURIComponent(isbn) + '&p=' + i;

      // Label chip carries the FULL dotted shortcode — a neutral identifier.
      // (The green "how established" tint lives on the mastery badge below.)
      const label = document.createElement('span');
      label.className = 'vb-label';
      label.textContent = fullLabel(p, i);

      const body = document.createElement('div');
      body.className = 'vb-body qbody';
      renderLatex(body, p.latex || '');

      // Bottom-left: the mastery WORD as a pill (New/Improving/Strong/Excellent)
      // plus the CI-history strip. The label chip's green depth echoes the same
      // mastery; the word spells it out.
      const m = attemptSummary.mastery(p);
      const badgeRow = document.createElement('div');
      badgeRow.className = 'vb-badge-row';
      const word = document.createElement('span');
      word.className = 'vb-mastery est-' + m;
      word.textContent = attemptSummary.MASTERY_LABEL[m];
      badgeRow.appendChild(word);
      if ((p.attempts || []).length > 0) {
        badgeRow.appendChild(attemptSummary.ciStripEl(p.attempts, { cap: 8 }));
      }

      // Bottom-right: the NEXT time the problem comes up. purple = ready now,
      // grey = inactive/resting ("Ready in N days"). Excellent (finalized) is
      // graduated — it has no next, so the column is left empty.
      const ready = document.createElement('span');
      ready.className = 'vb-ready';
      const r = attemptSummary.readiness(p, m);
      if (r === 'finalized') { /* no next — graduated */ }
      else if (r === 'waiting') {
        ready.classList.add('r-waiting');
        const d = p.nextReviewInDays;
        ready.textContent = d != null ? ('Ready in ' + d + ' day' + (d === 1 ? '' : 's')) : 'Resting';
      } else { ready.classList.add('r-ready'); ready.textContent = 'Ready now'; }

      const chev = document.createElement('span');
      chev.className = 'vb-chev';
      chev.setAttribute('aria-hidden', 'true');
      chev.textContent = '›';   // ›

      row.append(label, body, badgeRow, ready, chev);
      return row;
    }

    chapters.forEach((chapter) => {
      const isUngrouped = chapter.name == null;
      const total = chapter.direct.length +
        [...chapter.sections.values()].reduce((s, arr) => s + arr.length, 0);

      const chapterEl = document.createElement('li');
      chapterEl.className = 'vb-group';
      const header = makeHeader(isUngrouped ? [] : [chapter.name], isUngrouped, total);
      wireToggle(header, chapterEl);

      const groupBody = document.createElement('div');
      groupBody.className = 'vb-group-rows';

      // Direct chapter problems FIRST (loose, before lettered subsections).
      chapter.direct.forEach(({ p, i }) => groupBody.appendChild(makeRow(p, i)));

      // Then subsections, alphabetically by section letter.
      [...chapter.sections.keys()]
        .sort((a, b) => a.localeCompare(b, undefined, { numeric: true }))
        .forEach((sectionName) => {
          const items = chapter.sections.get(sectionName);
          const subEl = document.createElement('div');
          subEl.className = 'vb-subgroup';
          const subHeader = makeHeader([chapter.name, sectionName], false, items.length);
          subHeader.classList.add('is-sub');
          wireToggle(subHeader, subEl);
          const subRows = document.createElement('div');
          subRows.className = 'vb-group-rows';
          items.forEach(({ p, i }) => subRows.appendChild(makeRow(p, i)));
          subEl.append(subHeader, subRows);
          groupBody.appendChild(subEl);
        });

      chapterEl.append(header, groupBody);
      listHost.appendChild(chapterEl);
    });
  </script>
  <script src="footer.js" defer></script>
</body>
</html>
