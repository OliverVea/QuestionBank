<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <title>Question Bank — Single Screen Mock</title>
  <link rel="stylesheet" href="mocks.css" />
  <link rel="stylesheet" href="single-screen.css" />
</head>
<body class="anim-cascade">
  <div class="app">
    <!-- Banner 1: Revisit (blue) -->
    <button class="banner revisit animate-in" style="--i: 0" id="revisit-banner">
      <span class="b-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 0 1 15.5-6.2L21 8" />
          <path d="M21 3v5h-5" />
          <path d="M21 12a9 9 0 0 1-15.5 6.2L3 16" />
          <path d="M3 21v-5h5" />
        </svg>
      </span>
      <span class="b-text">
        <span class="b-eyebrow" id="revisit-eyebrow">Revisit: 5 problems waiting</span>
        <span class="b-cta" id="revisit-cta">Make it stick<span class="b-arrow" aria-hidden="true">→</span></span>
      </span>
    </button>

    <!-- Banner 2: Learn (green) -->
    <button class="banner learn animate-in" style="--i: 1" id="learn-banner">
      <span class="b-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18h6" />
          <path d="M10 21h4" />
          <path d="M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.2 1 2v.3h6v-.3c0-.8.4-1.5 1-2A7 7 0 0 0 12 2Z" />
          <path d="M12 6a3 3 0 0 0-3 3" />
        </svg>
      </span>
      <span class="b-text">
        <span class="b-eyebrow" id="learn-eyebrow">Next up: Griffiths 2A</span>
        <span class="b-cta" id="learn-cta">Grow your knowledge<span class="b-arrow" aria-hidden="true">→</span></span>
      </span>
    </button>

    <!-- Library list (rows animate individually; see books loop) -->
    <section class="library">
      <div class="library-head animate-in" style="--i: 2">
        <h2>Your library</h2>
        <button class="edit-btn" id="library-edit" aria-label="Edit library" title="Edit library">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9" />
            <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z" />
          </svg>
        </button>
      </div>
      <div id="books"></div>

      <!-- Add-a-book row at the end of the list -->
      <button class="add-book" id="add-book">
        <span class="plus" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 5v14" />
            <path d="M5 12h14" />
          </svg>
        </span>
        <span>Add a book to your library</span>
      </button>
    </section>
  </div>

  <script>
    const data = {
      revisitCount: 5,
      learnNext: { context: 'Griffiths 2A', preview: 'How many quantized energy levels…' },
      books: [
        { title: 'Introduction to Quantum Mechanics', author: 'David J. Griffiths', ready: 3, progress: 42, isbn: '9781107179868' },
        { title: 'Calculus', author: 'Michael Spivak', ready: 2, progress: 68, isbn: '9780914098911' },
        { title: 'Linear Algebra Done Right', author: 'Sheldon Axler', ready: 0, progress: 100, isbn: '9783319110790' },
        { title: 'Classical Mechanics', author: 'John R. Taylor', ready: 0, progress: 15, isbn: '9781891389221' },
        { title: 'Mathematical Methods for Physicists', author: 'Arfken & Weber', ready: 0, progress: 0, isbn: '9780123846549' },
      ],
    };

    // ---- Revisit banner ----
    const revisitBanner = document.getElementById('revisit-banner');
    if (data.revisitCount > 0) {
      const n = data.revisitCount;
      document.getElementById('revisit-eyebrow').textContent =
        `Revisit: ${n} problem${n === 1 ? '' : 's'} waiting`;
      revisitBanner.addEventListener('click', () => { window.location.href = 'learn.html'; });
    } else {
      revisitBanner.classList.add('empty');
      document.getElementById('revisit-eyebrow').textContent = 'Revisit';
      document.getElementById('revisit-cta').textContent = 'All caught up';
    }

    // ---- Learn banner ----
    const learnBanner = document.getElementById('learn-banner');
    if (data.learnNext) {
      document.getElementById('learn-eyebrow').textContent =
        `Next up: ${data.learnNext.context}`;
      learnBanner.addEventListener('click', () => { window.location.href = 'learn.html'; });
    } else {
      learnBanner.classList.add('empty');
      document.getElementById('learn-eyebrow').textContent = 'Learn';
      document.getElementById('learn-cta').textContent = 'Nothing new right now';
    }

    // ---- Library ----
    const COVER_CACHE_PREFIX = 'qb-cover:';

    /**
     * Deterministic fallback color from the title, drawn from the brand orange
     * ramp (not a random hue) so spines stay on-palette and a book always gets
     * the same shade. Normalize first: lowercase and keep only letters/numbers
     * of ANY script, dropping spaces and punctuation, then hash to a ramp step.
     * Only the darker steps are used so white text stays readable.
     */
    const ORANGE_STEPS = ['--orange-200', '--orange-300', '--orange-400', '--orange-500'];
    function titleColor(title) {
      const norm = title.toLowerCase().replace(/[^\p{L}\p{N}]/gu, '');
      let hash = 0;
      for (const ch of norm) {
        hash = (hash * 31 + ch.codePointAt(0)) >>> 0; // unsigned 32-bit rolling hash
      }
      const token = ORANGE_STEPS[hash % ORANGE_STEPS.length];
      return `var(${token})`;
    }

    /** A colored placeholder tile showing the title, when no cover is available. */
    function makeFallback(book) {
      const tile = document.createElement('span');
      tile.className = 'b-cover-fallback';
      tile.style.background = titleColor(book.title);
      const inner = document.createElement('span');
      inner.textContent = book.title;
      tile.appendChild(inner);
      return tile;
    }

    /**
     * Resolve a cover to a data URL: from localStorage cache if present,
     * otherwise fetch from Open Library and cache it. Returns null on any
     * failure (no cover / offline / OL placeholder).
     */
    async function resolveCover(book) {
      const key = COVER_CACHE_PREFIX + book.isbn;
      const cached = localStorage.getItem(key);
      if (cached) return cached;

      const url = `https://covers.openlibrary.org/b/isbn/${book.isbn}-M.jpg?default=false`;
      try {
        const res = await fetch(url);
        if (!res.ok) return null;
        const blob = await res.blob();
        if (blob.size < 100) return null; // OL returns a 1px gif for misses
        const dataUrl = await new Promise((resolve, reject) => {
          const fr = new FileReader();
          fr.onload = () => resolve(fr.result);
          fr.onerror = reject;
          fr.readAsDataURL(blob);
        });
        try { localStorage.setItem(key, dataUrl); } catch { /* quota — skip caching */ }
        return dataUrl;
      } catch {
        return null;
      }
    }

    /**
     * Show the fallback tile immediately, then swap in the real cover once it
     * resolves (instant when cached). Leaves the fallback in place on failure.
     */
    async function loadCover(placeholder, book) {
      const dataUrl = await resolveCover(book);
      if (!dataUrl) return; // keep the fallback already on screen
      const img = document.createElement('img');
      img.className = 'b-cover';
      img.alt = `${book.title} cover`;
      img.src = dataUrl;
      placeholder.replaceWith(img);
    }

    const booksHost = document.getElementById('books');
    // Continue the load-in cascade after the banners (0,1) and library head (2).
    const ROW_INDEX_OFFSET = 3;
    data.books.forEach((b, i) => {
      const row = document.createElement('div');
      row.className = 'book animate-in';
      row.style.setProperty('--i', ROW_INDEX_OFFSET + i);

      // Render the fallback tile immediately; loadCover swaps in the cover.
      const placeholder = makeFallback(b);

      const text = document.createElement('div');
      text.innerHTML = `
        <div class="b-title2">${b.title}</div>
        <div class="b-author">${b.author}</div>`;
      // unwrap the two text divs into the grid
      const title = text.firstElementChild;
      const author = title.nextElementSibling;

      const num = document.createElement('div');
      num.className = 'ready-num' + (b.progress === 0 ? ' none' : '');
      num.textContent = `${b.progress}%`;
      const lbl = document.createElement('div');
      lbl.className = 'ready-lbl' + (b.ready === 0 ? ' none' : '');
      lbl.textContent = b.ready === 0 ? '—' : `${b.ready} ready`;

      row.append(placeholder, title, author, num, lbl);
      // Tapping a book opens its read-only view (problem list + per-problem
      // attempt history). The library row is the entry point into a book.
      row.classList.add('tappable');
      row.addEventListener('click', () => {
        window.location.href = 'view-book.html?isbn=' + encodeURIComponent(b.isbn);
      });
      booksHost.appendChild(row);

      void loadCover(placeholder, b);
    });

    document.getElementById('library-edit').addEventListener('click',
      () => { window.location.href = 'manage-books.html'; });

    // Add-book row animates in last, after every book row.
    const addBook = document.getElementById('add-book');
    addBook.classList.add('animate-in');
    addBook.style.setProperty('--i', ROW_INDEX_OFFSET + data.books.length);
    addBook.addEventListener('click', () => { window.location.href = 'add-book.html'; });

    // Start at the top. The load-in cascade can leave the scroll container (and
    // the page) nudged down on some browsers / on back-forward restore; pin both
    // to the top so the home screen always opens at the first row.
    if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
    const library = document.querySelector('.library');
    requestAnimationFrame(() => { window.scrollTo(0, 0); if (library) library.scrollTop = 0; });
  </script>
  <script src="footer.js" defer></script>
</body>
</html>
