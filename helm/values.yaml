replicaCount: 1

image:
  repository: questionbank
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

container:
  port: 3001

# Public via Cloudflare Tunnel. Cloudflare terminates TLS at the edge; the
# in-cluster Ingress speaks HTTP to cloudflared and skips cert-manager.
ingress:
  enabled: true
  host: questionbank.ovea.pro
  externalDnsTarget: "44a106ce-fecc-4ff0-abed-ea64dfbb8703.cfargotunnel.com"
  clusterIssuer: ""
  tls:
    enabled: false
    secretName: ""
  # Authentik forwardAuth; switch to infra-beta-authentik-forward-auth for beta.
  forwardAuthMiddleware: "infra-authentik-forward-auth@kubernetescrd"
  annotations:
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"

persistence:
  enabled: true
  size: 5Gi
  storageClass: ""
  # PVC name; left blank → "<release>-data"
  existingClaim: ""

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Plain env vars (non-secret). Empty values are dropped at render time.
config:
  NODE_ENV: "production"
  PORT: "3001"
  QB_DATA_DIR: "/data"
  # Authentik forwardAuth sets X-authentik-uid as the stable per-user identifier.
  QB_CUSTOMER_HEADER: "X-authentik-uid"
  # Multi-tenant by Authentik UID; never fall back to a shared default customer.
  QB_ALLOW_DEFAULT_CUSTOMER: "0"

# Secret-backed env vars. The Secret is created out-of-band (kubectl apply,
# OpenBao sync, etc.) — chart never commits secret values.
secrets:
  - name: questionbank-secrets
    envMap:
      ANTHROPIC_API_KEY: anthropic-api-key
