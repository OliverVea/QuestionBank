<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Question Bank — Single Screen Mock</title>
  <style>
    :root {
      --bg: #fff;
      --fg: #1a1a1a;
      --muted: #666;
      --border: #ddd;

      --revisit: #2563eb;       /* blue */
      --revisit-dark: #1d4ed8;
      --learn: #16a34a;         /* green */
      --learn-dark: #15803d;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      color: var(--fg);
      background: var(--bg);
    }

    /* One-screen shell: stacked regions, only the library list scrolls */
    .app {
      height: 100dvh;
      display: grid;
      grid-template-rows: auto auto 1fr;
      overflow: hidden;
      max-width: 760px;
      margin: 0 auto;
    }

    /* ---- Action banners ---- */
    .banner {
      position: relative;        /* anchor the watermark icon */
      overflow: hidden;          /* clip the oversized outline glyph */
      border: 1px solid var(--icon-stroke);
      cursor: pointer;
      font: inherit;
      text-align: left;
      color: #fff;
      padding: 1.25rem 1.4rem;
      margin: 0.25rem 0.3rem 0;
      border-radius: 14px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
      display: flex;
      align-items: center;
      gap: 0.85rem;
    }
    .banner:not(.empty) { cursor: pointer; }
    .banner:not(.empty):hover { filter: brightness(1.05); }

    /* Large line-art icon, darker tone, sitting behind the text */
    .banner .b-icon {
      position: absolute;
      right: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      height: 85%;                 /* ~85% of the banner's height */
      aspect-ratio: 1;             /* keep the icon square */
      pointer-events: none;
      color: var(--icon-stroke);   /* SVG strokes inherit via currentColor */
      opacity: 0.55;
    }
    .banner .b-icon svg { width: 100%; height: 100%; display: block; }
    .banner .b-text {
      flex: 1;
      min-width: 0;               /* allow the title to truncate */
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }
    .banner .b-eyebrow {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      opacity: 0.85;
    }
    .banner .b-title {
      font-size: 1.15rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }


    .banner.revisit { background: var(--revisit); --icon-stroke: var(--revisit-dark); }
    .banner.learn { background: var(--learn); --icon-stroke: var(--learn-dark); }

    /* Disabled / nothing-to-do state keeps the banner but softens it */
    .banner.empty {
      background: #f3f4f6;
      color: var(--muted);
      cursor: default;
      --icon-stroke: #cbd5e1;
    }
    .banner.empty:hover { filter: none; }

    /* ---- Library ---- */
    .library {
      min-height: 0;
      overflow-y: auto;
      padding: 0.75rem 0 0.5rem;
    }
    .library-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1.25rem 0.4rem;
    }
    .library h2 {
      margin: 0;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }
    .edit-btn {
      flex: none;
      border: none;
      background: none;
      padding: 0.2rem;
      cursor: pointer;
      color: var(--muted);
      line-height: 0;
      border-radius: 6px;
    }
    .edit-btn svg { width: 1.1rem; height: 1.1rem; display: block; }
    .edit-btn:hover { background: #eee; color: var(--fg); }

    .book {
      display: grid;
      grid-template-columns: 64px 1fr auto;
      grid-template-areas:
        "icon title  ready-num"
        "icon author ready-lbl";
      column-gap: 1rem;
      padding: 0.85rem 1.25rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      align-items: center;
    }
    .book:hover { background: #f7f9ff; }

    .book .b-cover {
      grid-area: icon;
      align-self: center;
      width: auto;                /* width follows the cover's real aspect ratio */
      height: 68px;
      max-width: 64px;            /* clamp very wide covers so the row stays sane */
      justify-self: center;       /* center within the fixed cover column */
      border-radius: 3px;
      object-fit: contain;        /* show the whole cover, don't crop to a shape */
      background: #e5e7eb;        /* placeholder tone while loading / on error */
      box-shadow: 3px 4px 7px rgba(0, 0, 0, 0.3);
      display: block;
    }
    /* Fallback tile shown when the cover image fails to load */
    .book .b-cover-fallback {
      grid-area: icon;
      align-self: center;
      justify-self: center;
      width: max-content;          /* grow to fit the longest word… */
      min-width: 40px;
      max-width: 58px;             /* …but stay slim like a real spine */
      height: 68px;
      border-radius: 3px;
      box-shadow: 3px 4px 7px rgba(0, 0, 0, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3px 2px;
      overflow: hidden;
    }
    .book .b-cover-fallback span {
      display: block;
      text-align: center;
      font-size: 0.55rem;
      font-weight: 600;
      line-height: 1.2;
      color: #fff;
      overflow: hidden;
      overflow-wrap: anywhere;     /* wrap only if a word exceeds max-width */
      max-height: 100%;
    }

    .book .b-title2 { grid-area: title; font-size: 1.05rem; font-weight: 600; }
    .book .b-author { grid-area: author; font-size: 0.85rem; color: var(--muted); margin-top: 0.15rem; }

    .book .ready-num {
      grid-area: ready-num;
      justify-self: end;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--revisit);
    }
    .book .ready-num.none { color: var(--border); }
    .book .ready-lbl {
      grid-area: ready-lbl;
      justify-self: end;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      margin-top: 0.15rem;
    }

    /* ---- Add-book footer ---- */
    .add-book {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      width: 100%;
      border: none;
      border-top: 1px solid var(--border);
      background: #fafafa;
      color: var(--fg);
      font: inherit;
      font-weight: 600;
      padding: 0.9rem 1.25rem;
      cursor: pointer;
    }
    .add-book:hover { background: #f0f4ff; color: var(--revisit); }
    .add-book .plus {
      flex: none;
      width: 1.9rem;
      height: 1.9rem;
      line-height: 0;
      color: var(--revisit);
    }
    .add-book .plus svg { width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>
  <div class="app">
    <!-- Banner 1: Revisit (blue) -->
    <button class="banner revisit" id="revisit-banner">
      <span class="b-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 0 1 15.5-6.2L21 8" />
          <path d="M21 3v5h-5" />
          <path d="M21 12a9 9 0 0 1-15.5 6.2L3 16" />
          <path d="M3 21v-5h5" />
        </svg>
      </span>
      <span class="b-text">
        <span class="b-eyebrow">Revisit:</span>
        <span class="b-title" id="revisit-title">5 problems ready for you</span>
      </span>
    </button>

    <!-- Banner 2: Learn (green) -->
    <button class="banner learn" id="learn-banner">
      <span class="b-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18h6" />
          <path d="M10 21h4" />
          <path d="M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.2 1 2v.3h6v-.3c0-.8.4-1.5 1-2A7 7 0 0 0 12 2Z" />
          <path d="M12 6a3 3 0 0 0-3 3" />
        </svg>
      </span>
      <span class="b-text">
        <span class="b-eyebrow">Next up:</span>
        <span class="b-title" id="learn-title">Griffiths 2A — How many qua…</span>
      </span>
    </button>

    <!-- Library list -->
    <section class="library">
      <div class="library-head">
        <h2>Your library</h2>
        <button class="edit-btn" id="library-edit" aria-label="Edit library" title="Edit library">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9" />
            <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z" />
          </svg>
        </button>
      </div>
      <div id="books"></div>

      <!-- Add-a-book row at the end of the list -->
      <button class="add-book" id="add-book">
        <span class="plus" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 5v14" />
            <path d="M5 12h14" />
          </svg>
        </span>
        <span>Add a book to your library</span>
      </button>
    </section>
  </div>

  <script>
    const data = {
      revisitCount: 5,
      learnNext: { context: 'Griffiths 2A', preview: 'How many quantized energy levels…' },
      books: [
        { title: 'Introduction to Quantum Mechanics', author: 'David J. Griffiths', ready: 3, isbn: '9781107179868' },
        { title: 'Calculus', author: 'Michael Spivak', ready: 2, isbn: '9780914098911' },
        { title: 'Linear Algebra Done Right', author: 'Sheldon Axler', ready: 0, isbn: '9783319110790' },
        { title: 'Classical Mechanics', author: 'John R. Taylor', ready: 0, isbn: '9781891389221' },
        { title: 'Mathematical Methods for Physicists', author: 'Arfken & Weber', ready: 0, isbn: '9780123846549' },
      ],
    };

    // ---- Revisit banner ----
    const revisitBanner = document.getElementById('revisit-banner');
    if (data.revisitCount > 0) {
      const n = data.revisitCount;
      document.getElementById('revisit-title').textContent =
        `${n} problem${n === 1 ? '' : 's'} ready for you`;
      revisitBanner.addEventListener('click', () => alert('→ open the Revisit queue'));
    } else {
      revisitBanner.classList.add('empty');
      document.getElementById('revisit-title').textContent = 'All caught up';
    }

    // ---- Learn banner ----
    const learnBanner = document.getElementById('learn-banner');
    if (data.learnNext) {
      document.getElementById('learn-title').textContent =
        `${data.learnNext.context} — ${data.learnNext.preview}`;
      learnBanner.addEventListener('click', () => alert('→ open the Learn flow'));
    } else {
      learnBanner.classList.add('empty');
      document.getElementById('learn-title').textContent = 'Nothing new right now';
    }

    // ---- Library ----
    const COVER_CACHE_PREFIX = 'qb-cover:';

    /**
     * Deterministic fallback color from the title. Normalize first: lowercase
     * and keep only letters/numbers of ANY script (Latin, Chinese, Cyrillic,
     * Arabic, …), dropping spaces and punctuation. Hash that to a hue so the
     * same book always gets the same color regardless of formatting.
     */
    function titleColor(title) {
      const norm = title.toLowerCase().replace(/[^\p{L}\p{N}]/gu, '');
      let hash = 0;
      for (const ch of norm) {
        hash = (hash * 31 + ch.codePointAt(0)) >>> 0; // unsigned 32-bit rolling hash
      }
      const hue = hash % 360;
      return `hsl(${hue} 55% 42%)`; // fixed S/L keeps text readable on every hue
    }

    /** A colored placeholder tile showing the title, when no cover is available. */
    function makeFallback(book) {
      const tile = document.createElement('span');
      tile.className = 'b-cover-fallback';
      tile.style.background = titleColor(book.title);
      const inner = document.createElement('span');
      inner.textContent = book.title;
      tile.appendChild(inner);
      return tile;
    }

    /**
     * Resolve a cover to a data URL: from localStorage cache if present,
     * otherwise fetch from Open Library and cache it. Returns null on any
     * failure (no cover / offline / OL placeholder).
     */
    async function resolveCover(book) {
      const key = COVER_CACHE_PREFIX + book.isbn;
      const cached = localStorage.getItem(key);
      if (cached) return cached;

      const url = `https://covers.openlibrary.org/b/isbn/${book.isbn}-M.jpg?default=false`;
      try {
        const res = await fetch(url);
        if (!res.ok) return null;
        const blob = await res.blob();
        if (blob.size < 100) return null; // OL returns a 1px gif for misses
        const dataUrl = await new Promise((resolve, reject) => {
          const fr = new FileReader();
          fr.onload = () => resolve(fr.result);
          fr.onerror = reject;
          fr.readAsDataURL(blob);
        });
        try { localStorage.setItem(key, dataUrl); } catch { /* quota — skip caching */ }
        return dataUrl;
      } catch {
        return null;
      }
    }

    /**
     * Show the fallback tile immediately, then swap in the real cover once it
     * resolves (instant when cached). Leaves the fallback in place on failure.
     */
    async function loadCover(placeholder, book) {
      const dataUrl = await resolveCover(book);
      if (!dataUrl) return; // keep the fallback already on screen
      const img = document.createElement('img');
      img.className = 'b-cover';
      img.alt = `${book.title} cover`;
      img.src = dataUrl;
      placeholder.replaceWith(img);
    }

    const booksHost = document.getElementById('books');
    data.books.forEach((b) => {
      const row = document.createElement('div');
      row.className = 'book';

      // Render the fallback tile immediately; loadCover swaps in the cover.
      const placeholder = makeFallback(b);

      const text = document.createElement('div');
      text.innerHTML = `
        <div class="b-title2">${b.title}</div>
        <div class="b-author">${b.author}</div>`;
      // unwrap the two text divs into the grid
      const title = text.firstElementChild;
      const author = title.nextElementSibling;

      const num = document.createElement('div');
      num.className = 'ready-num' + (b.ready === 0 ? ' none' : '');
      num.textContent = b.ready;
      const lbl = document.createElement('div');
      lbl.className = 'ready-lbl';
      lbl.textContent = b.ready === 0 ? '—' : 'ready';

      row.append(placeholder, title, author, num, lbl);
      row.addEventListener('click', () => alert('→ open book: ' + b.title));
      booksHost.appendChild(row);

      void loadCover(placeholder, b);
    });

    document.getElementById('library-edit').addEventListener('click',
      () => alert('→ edit library (add/rename/remove books)'));

    document.getElementById('add-book').addEventListener('click',
      () => alert('→ add a book to your library'));
  </script>
</body>
</html>
