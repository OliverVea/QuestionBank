replicaCount: 1

image:
  repository: questionbank
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

container:
  port: 3001

# Public via Cloudflare Tunnel. Cloudflare terminates TLS at the edge; the
# in-cluster Ingress speaks HTTP to cloudflared and skips cert-manager.
ingress:
  enabled: true
  host: questionbank.ovea.pro
  externalDnsTarget: "44a106ce-fecc-4ff0-abed-ea64dfbb8703.cfargotunnel.com"
  clusterIssuer: ""
  tls:
    enabled: false
    secretName: ""
  # Authentik forwardAuth; switch to infra-beta-authentik-forward-auth for beta.
  forwardAuthMiddleware: "infra-authentik-forward-auth@kubernetescrd"
  annotations:
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"

# PEM of a CA/self-signed cert to add to the Node trust store (NODE_EXTRA_CA_CERTS).
# Used so the in-cluster server can fetch the OIDC JWKS over TLS when the authority's
# valid cert lives only at the public edge and Traefik serves a self-signed cert
# internally. Empty (default) → no extra CA mounted. Set in values-minimal.yaml (prod).
oidcCaCert: ""

persistence:
  enabled: true
  size: 5Gi
  storageClass: ""
  # PVC name; left blank → "<release>-data"
  existingClaim: ""

resources:
  requests:
    cpu: 50m
    # 256Mi headroom for the baseline; /api/scan peaks much higher (see limit).
    memory: 256Mi
  limits:
    cpu: 500m
    # /api/scan decodes a full-res page, gets a large rectified PNG back from the
    # figure-service, cuts crops with sharp, and base64-encodes several images for
    # the matcher LLM call — this peaks well over 256Mi and OOMKilled the pod. 1Gi
    # gives that path headroom.
    memory: 1Gi

# Plain env vars (non-secret). Empty values are dropped at render time.
config:
  NODE_ENV: "production"
  PORT: "3001"
  QB_DATA_DIR: "/data"
  # Authentik forwardAuth sets X-authentik-uid as the stable per-user identifier.
  QB_CUSTOMER_HEADER: "X-authentik-uid"
  # Multi-tenant by Authentik UID; never fall back to a shared default customer.
  QB_ALLOW_DEFAULT_CUSTOMER: "0"
  # In-cluster figure-service Service DNS.
  FIGURE_SERVICE_URL: "http://questionbank-figures.apps.svc.cluster.local"
  # Emit one JSON object per log line for machine ingestion (cluster log shipping).
  # Backend-agnostic: names no specific log sink. Unset/"pretty" = human ANSI format.
  QB_LOG_FORMAT: "json"

# Secret-backed env vars. The Secret is created out-of-band (kubectl apply,
# OpenBao sync, etc.) — chart never commits secret values.
# figure-service-auth (key api-key) carries the shared figure-service API key.
secrets:
  - name: questionbank-secrets
    envMap:
      ANTHROPIC_API_KEY: anthropic-api-key
  - name: figure-service-auth
    envMap:
      FIGURE_SERVICE_API_KEY: api-key
