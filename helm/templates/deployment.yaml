apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  # RWO PVC can only be mounted by one pod, so block the rolling overlap.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.container.port }}
          env:
            {{- range $key, $value := .Values.config }}
            {{- if $value }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}
            {{- range .Values.secrets }}
            {{- $secretName := .name }}
            {{- range $envVar, $key := .envMap }}
            - name: {{ $envVar }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: {{ $key }}
            {{- end }}
            {{- end }}
            {{- if .Values.oidcCaCert }}
            # Trust the authority's internal self-signed cert so verifyBearer can fetch JWKS.
            - name: NODE_EXTRA_CA_CERTS
              value: /etc/oidc-ca/auth-ca.crt
            {{- end }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.container.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.container.port }}
            initialDelaySeconds: 3
            periodSeconds: 5
          {{- if or .Values.persistence.enabled .Values.oidcCaCert }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: {{ .Values.config.QB_DATA_DIR | default "/data" }}
            {{- end }}
            {{- if .Values.oidcCaCert }}
            - name: oidc-ca
              mountPath: /etc/oidc-ca
              readOnly: true
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if or .Values.persistence.enabled .Values.oidcCaCert }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (printf "%s-data" .Release.Name) }}
        {{- end }}
        {{- if .Values.oidcCaCert }}
        - name: oidc-ca
          configMap:
            name: {{ .Release.Name }}-oidc-ca
        {{- end }}
      {{- end }}
