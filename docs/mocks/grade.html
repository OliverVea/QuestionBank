<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <!-- PWA: installable, runs in its own window (standalone). -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#f9ae60" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="QuestionBank" />
  <title>Question Bank — Grade Chat Mock</title>
  <link rel="stylesheet" href="vendor/katex/katex.min.css" />
  <link rel="stylesheet" href="mocks.css" />
  <link rel="stylesheet" href="grade.css" />
</head>
<body class="anim-cascade">
  <script src="vendor/katex/katex.min.js"></script>
  <!-- `.grade-page` is the page shell (prod vocabulary): topbar / question /
       phase bar / chat / actions, the chat scrolling between the pinned chrome.
       The photo flow runs as two sequential chats — transcription, then grading
       (the confirmed reading seeds the grading chat). -->
  <div class="grade-page">
    <!-- Top bar: Back (left) / Skip + when-it-returns (right) -->
    <header class="topbar">
      <button class="topbar-btn" id="back-btn">
        <span aria-hidden="true">←</span> Back
      </button>
      <button class="topbar-btn" id="skip-btn">
        Skip <span class="tb-sub">12h</span>
      </button>
    </header>

    <!-- Collapsible question, so the chat gets the room -->
    <details class="qfold" id="qfold">
      <summary class="qfold-summary">
        <span class="qfold-label">Question</span>
        <span class="qfold-ctx" id="q-eyebrow">Griffiths · Chapter 2 · Problem 1</span>
        <span class="qfold-chev" aria-hidden="true">⌄</span>
      </summary>
      <div class="qfold-body" id="q-body"><!-- rendered question --></div>
    </details>

    <!-- Two-step indicator (photo flow only): transcription → grading -->
    <div class="phase-bar" id="phase-bar" hidden>
      <span class="phase-step" id="phase-step">Step 1 of 2</span>
      <span class="phase-name" id="phase-name">Check the reading</span>
    </div>

    <!-- The active conversation (rebuilt from the `conversation` model) -->
    <main class="chat-container" id="chat"><!-- turns injected below --></main>

    <!-- Bottom: reply box, advance (transcription) or save/rate (grading) -->
    <footer class="grade-actions">
      <div class="reply-row">
        <textarea class="reply-input" id="reply" rows="1"
          placeholder="Clarify or add to your answer…"></textarea>
        <button class="reply-send" id="send-btn" aria-label="Send">→</button>
      </div>
      <!-- Transcription step: confirm the reading and move on to grading -->
      <button class="advance-btn" id="advance-btn" type="button" hidden>Looks good — grade it →</button>
      <!-- Grading step: save the attempt with a grade -->
      <div class="grade-row" id="grade-row" hidden>
        <button class="grade-btn gb-incorrect" data-grade="incorrect">Incorrect</button>
        <button class="grade-btn gb-partial" data-grade="partial">Partial</button>
        <button class="grade-btn gb-correct" data-grade="correct">Correct</button>
      </div>
    </footer>
  </div>

  <script>
    // --- Minimal LaTeX/markdown renderer, ported from the real client. ---
    function splitMath(source) {
      const segments = []; let text = '';
      const pushText = () => { if (text) segments.push({ kind: 'text', value: text }); text = ''; };
      let i = 0;
      while (i < source.length) {
        const ch = source[i];
        if (ch === '\\' && source[i + 1] === '$') { text += '$'; i += 2; continue; }
        if (ch === '$') {
          const display = source[i + 1] === '$';
          const open = display ? i + 2 : i + 1;
          const close = findClosingDollar(source, open, display);
          if (close === -1) { text += ch; i += 1; continue; }
          pushText();
          segments.push({ kind: 'math', value: source.slice(open, close), display });
          i = display ? close + 2 : close + 1; continue;
        }
        text += ch; i += 1;
      }
      pushText(); return segments;
    }
    function findClosingDollar(source, from, display) {
      for (let j = from; j < source.length; j++) {
        if (source[j] === '\\') { j++; continue; }
        if (source[j] === '$') {
          if (display) { if (source[j + 1] === '$') return j; continue; }
          return j;
        }
      }
      return -1;
    }
    const HTML_ESCAPES = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
    function escapeHtml(t) { return t.replace(/[&<>"']/g, (c) => HTML_ESCAPES[c]); }
    function renderMarkup(text) {
      let html = escapeHtml(text);
      html = html.replace(/\*\*([^]+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*([^*]+?)\*/g, '<em>$1</em>');
      html = html.replace(/\n\n+/g, '<br><br>').replace(/\n/g, '<br>');
      return html;
    }
    function renderContent(host, source) {
      host.innerHTML = '';
      for (const seg of splitMath(source)) {
        if (seg.kind === 'text') {
          const span = document.createElement('span');
          span.innerHTML = renderMarkup(seg.value);
          host.appendChild(span); continue;
        }
        const mathHost = seg.display ? document.createElement('div') : document.createElement('span');
        if (seg.display) mathHost.className = 'qbody-display';
        if (window.katex) katex.render(seg.value, mathHost, { displayMode: seg.display, throwOnError: false });
        else mathHost.textContent = seg.display ? seg.value : '$' + seg.value + '$';
        host.appendChild(mathHost);
      }
    }

    // --- Icons ---
    const PENCIL_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
         stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9" />
      <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z" /></svg>`;
    const CAMERA_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"
         stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 8a2 2 0 0 1 2-2h2l1.2-1.6A2 2 0 0 1 11.8 4h.4a2 2 0 0 1 1.6.8L15 6h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z" />
      <circle cx="12" cy="12.5" r="3.2" /></svg>`;
    const DEVICE_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"
         stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="16" rx="2" />
      <circle cx="8.5" cy="9" r="1.6" />
      <path d="m4 18 5-5 3.5 3.5L16 12l4 4" /></svg>`;

    // --- Demo data ---
    const QUESTION =
      'Suppose $a$ and $b$ are real numbers, not both 0. Find real numbers $c$ and $d$ such that\n' +
      '$$1/(a+bi) = c+di.$$';

    // Typed demo conversation (user → partial → user → correct). Grader turns
    // store their parsed payload directly.
    const DEMO = [
      { role: 'user', text: 'Multiply top and bottom by the conjugate: $\\frac{1}{a+bi} = \\frac{a-bi}{a^2+b^2}$, so $c = \\frac{a}{a^2+b^2}$.' },
      { role: 'assistant', kind: 'grade', payload: {
        grade: 'partial',
        issues: [
          { severity: 'critical', text: 'You found $c$ but never gave $d$. The imaginary part is missing.' },
          { severity: 'minor', text: 'State briefly why $a^2+b^2 \\neq 0$ (since $a,b$ are not both 0).' },
        ],
        reasoning: 'The conjugate method is right and $c=\\frac{a}{a^2+b^2}$ is correct, but a complete answer must also give $d$.',
      } },
      { role: 'user', text: 'Right — and $d = \\frac{-b}{a^2+b^2}$. Also $a^2+b^2 > 0$ because $a,b$ are not both zero.' },
      { role: 'assistant', kind: 'grade', payload: {
        grade: 'correct', issues: [],
        reasoning: 'Both parts now given: $c=\\frac{a}{a^2+b^2}$, $d=\\frac{-b}{a^2+b^2}$, with the nonzero-denominator justified. Complete.',
      } },
    ];

    // Successive fake readings of the photo — the first read, then re-reads after
    // the user points out a mistake.
    const READINGS = [
      'By the conjugate, $\\frac{1}{a+bi}=\\frac{a-bi}{a^2+b^2}$, so $c=\\frac{a}{a^2+b^2}$ and $d=\\frac{-b}{a^2+b^2}$.',
      'Re-read it — $c=\\frac{a}{a^2+b^2}$ and $d=\\frac{-b}{a^2+b^2}$, with $a^2+b^2>0$ since $a,b$ are not both 0.',
    ];
    const FAKE_GRADE = {
      grade: 'correct', issues: [],
      reasoning: 'Both real and imaginary parts are given and correct; the conjugate step is sound.',
    };

    // ===================================================================
    // Model — `conversation` is the active chat's source of truth. The photo
    // flow runs two chats in sequence (phase 'transcribe' → 'grade'); entering
    // grading clears the model and seeds it with the confirmed reading.
    // ===================================================================
    let conversation = [];   // turns: { id, role, kind?, text?, payload? }
    let nextId = 1;
    let phase = 'grade';     // 'transcribe' | 'grade'
    let sending = false;     // a read/grade is in flight
    let editingId = null;    // id of the user turn being inline-edited
    let transient = null;    // ephemeral node (capture prompt / thinking)
    let suggested = null;    // last grader grade → drives the grade-row
    let currentReading = ''; // latest transcription
    let readIdx = 0;         // which canned reading comes next
    const seen = new Set();  // turn ids already animated

    function addUser(text, kind) { const id = nextId++; conversation.push({ id, role: 'user', text, kind }); return id; }
    function addReading(text) { conversation.push({ id: nextId++, role: 'assistant', kind: 'reading', text }); }
    function addGrade(payload) { conversation.push({ id: nextId++, role: 'assistant', kind: 'grade', payload }); }
    function editUserTurn(id, text) {
      const idx = conversation.findIndex((t) => t.id === id);
      if (idx === -1) return;
      conversation[idx] = { ...conversation[idx], text };
      conversation.length = idx + 1;   // revert: drop everything after the edited turn
    }
    const hasReading = () => conversation.some((t) => t.kind === 'reading');

    // --- DOM handles ---
    const chat = document.getElementById('chat');
    const reply = document.getElementById('reply');
    const sendBtn = document.getElementById('send-btn');
    const gradeRow = document.getElementById('grade-row');
    const advanceBtn = document.getElementById('advance-btn');
    const phaseBar = document.getElementById('phase-bar');
    const phaseStep = document.getElementById('phase-step');
    const phaseName = document.getElementById('phase-name');

    document.getElementById('q-eyebrow').textContent = 'Griffiths · Chapter 2 · Problem 1';
    renderContent(document.getElementById('q-body'), QUESTION);

    const mode = new URLSearchParams(location.search).get('mode') === 'photo' ? 'photo' : 'type';

    function el(tag, cls, text) { const n = document.createElement(tag); if (cls) n.className = cls; if (text != null) n.textContent = text; return n; }
    function autoGrow(ta, max) { ta.style.height = 'auto'; ta.style.height = Math.min(ta.scrollHeight, max || 120) + 'px'; }

    // ===================================================================
    // Bubble builders (data → DOM)
    // ===================================================================
    function userBubble(turn) {
      const bubble = el('div', 'chat-bubble chat-bubble-user');

      if (turn.kind === 'photo') {                       // photo turn: thumbnails, not editable
        bubble.classList.add('photo-bubble');
        bubble.appendChild(el('div', 'photo-thumb photo-thumb-ph', 'solution photo'));
        if (turn.text) bubble.appendChild(el('div', 'photo-notes-text', turn.text));
        return bubble;
      }

      if (editingId === turn.id) {                        // inline editor (grading: edit & revert)
        const ta = el('textarea', 'bubble-editor'); ta.value = turn.text;
        const actions = el('div', 'bubble-edit-actions');
        const cancel = el('button', 'bubble-btn bubble-cancel', 'Cancel'); cancel.type = 'button';
        const save = el('button', 'bubble-btn bubble-save', 'Save'); save.type = 'button';
        cancel.addEventListener('click', () => { editingId = null; render(); });
        save.addEventListener('click', () => {
          const v = ta.value.trim(); if (!v) return;
          editingId = null;
          editUserTurn(turn.id, v);
          render();
          void doGrade();
        });
        actions.append(cancel, save);
        bubble.append(ta, actions);
        setTimeout(() => { ta.focus(); autoGrow(ta, 160); }, 0);
        return bubble;
      }

      const body = el('div', 'qbody');
      renderContent(body, turn.text);
      bubble.appendChild(body);
      // Edit affordance — grading phase only, and not while a grade is in flight.
      if (phase === 'grade' && !sending) {
        const edit = el('button', 'bubble-edit'); edit.type = 'button';
        edit.innerHTML = PENCIL_ICON + '<span>Edit</span>';
        edit.setAttribute('aria-label', 'Edit your message');
        edit.addEventListener('click', () => { editingId = turn.id; render(); });
        bubble.appendChild(edit);
      }
      return bubble;
    }

    function readingBubble(text) {
      const bubble = el('div', 'chat-bubble chat-bubble-agent reading-bubble');
      bubble.appendChild(el('div', 'reading-label', "Here's what I read"));
      const body = el('div', 'qbody');
      renderContent(body, text);
      bubble.appendChild(body);
      return bubble;
    }

    function graderBubble(p) {
      const bubble = el('div', 'chat-bubble chat-bubble-agent');
      bubble.appendChild(el('span', `grade-badge grade-${p.grade}`, p.grade));

      if (p.issues.length === 0) {
        bubble.appendChild(el('div', 'grade-ok', 'No issues found — looks correct.'));
      } else {
        const list = el('ul', 'issue-list');
        for (const issue of p.issues) {
          const li = el('li', `issue issue-${issue.severity}`);
          li.appendChild(el('span', 'issue-sev', issue.severity));
          const desc = el('span', 'issue-desc qbody');
          renderContent(desc, issue.text);
          li.appendChild(desc);
          list.appendChild(li);
        }
        bubble.appendChild(list);
      }

      const det = el('details', 'reasoning');
      det.appendChild(el('summary', null, 'Show reasoning'));
      const rb = el('div', 'reasoning-body qbody');
      renderContent(rb, p.reasoning);
      det.appendChild(rb);
      bubble.appendChild(det);
      return bubble;
    }

    function thinkingBubble(label) {
      const bubble = el('div', 'chat-bubble chat-bubble-agent thinking-bubble');
      bubble.innerHTML =
        '<span class="thinking-dots"><span></span><span></span><span></span></span>' +
        `<span class="thinking-label">${label}</span>`;
      return bubble;
    }

    function buildTurn(turn) {
      if (turn.role === 'user') return userBubble(turn);
      if (turn.kind === 'reading') return readingBubble(turn.text);
      return graderBubble(turn.payload);
    }

    // ===================================================================
    // render() — rebuild the active chat, re-append the transient overlay, and
    // set the phase bar + footer (advance vs grade-row) + compose state.
    // ===================================================================
    function render() {
      chat.innerHTML = '';
      for (const turn of conversation) {
        const node = buildTurn(turn);
        if (!seen.has(turn.id)) { node.classList.add('animate-in'); node.style.setProperty('--i', 0); seen.add(turn.id); }
        chat.appendChild(node);
      }
      if (transient) chat.appendChild(transient);

      // Two-step indicator — only the photo flow has a transcription step.
      phaseBar.hidden = mode !== 'photo';
      if (mode === 'photo') {
        phaseStep.textContent = phase === 'transcribe' ? 'Step 1 of 2' : 'Step 2 of 2';
        phaseName.textContent = phase === 'transcribe' ? 'Check the reading' : 'Grading';
      }

      if (phase === 'transcribe') {
        reply.placeholder = 'Tell me what to fix…';
        advanceBtn.hidden = !hasReading();          // confirm appears once a reading exists
        gradeRow.hidden = true;
      } else {
        reply.placeholder = 'Clarify or add to your answer…';
        advanceBtn.hidden = true;
        gradeRow.hidden = suggested === null;
        gradeRow.querySelectorAll('.grade-btn').forEach((b) => b.classList.toggle('suggested', b.dataset.grade === suggested));
      }

      // Compose-while-busy: only the send button locks; the textarea stays live.
      sendBtn.disabled = sending;
    }

    // ===================================================================
    // Scroll rules: open at the top; keep the bottom in view for your own
    // messages; land on the TOP of an agent reply so it reads from the start.
    // ===================================================================
    function scrollToTop() { chat.scrollTop = 0; }
    function scrollToBottom() { chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' }); }
    function scrollToLastAgent() {
      const agents = chat.querySelectorAll('.chat-bubble-agent:not(.thinking-bubble)');
      const node = agents[agents.length - 1];
      if (node) chat.scrollTo({ top: Math.max(0, node.offsetTop - 8), behavior: 'smooth' });
    }

    // ===================================================================
    // Phase 1 — transcription chat (conversational: correct it, AI re-reads)
    // ===================================================================
    function startPhotoFlow() {
      phase = 'transcribe';
      const wrapper = el('div', 'photo-capture');
      wrapper.appendChild(el('div', 'photo-capture-prompt', 'Add a photo of your solution'));
      const picker = el('div', 'img-src-picker');
      picker.innerHTML =
        `<button class="img-src-btn img-src-camera" type="button">
           <span class="img-src-icon" aria-hidden="true">${CAMERA_ICON}</span>Camera
         </button>
         <button class="img-src-btn img-src-device" type="button">
           <span class="img-src-icon" aria-hidden="true">${DEVICE_ICON}</span>Device
         </button>`;
      picker.querySelectorAll('.img-src-btn').forEach((btn) => {
        btn.addEventListener('click', () => { transient = null; addUser('', 'photo'); render(); scrollToBottom(); readPhoto('Reading…'); });
      });
      wrapper.appendChild(picker);
      transient = wrapper;
      render();
    }

    function readPhoto(label) {
      sending = true;
      transient = thinkingBubble(label);
      render();
      scrollToBottom();
      setTimeout(() => {
        transient = null;
        currentReading = READINGS[Math.min(readIdx, READINGS.length - 1)];
        readIdx++;
        addReading(currentReading);
        sending = false;
        render();
        scrollToLastAgent();
      }, 1000);
    }

    function enterGradePhase() {
      phase = 'grade';
      conversation = [];          // a fresh grading chat
      seen.clear();
      suggested = null;
      editingId = null;
      addUser(currentReading);    // seed the answer (now inline-editable)
      render();
      scrollToTop();
      void doGrade();
    }

    // ===================================================================
    // Phase 2 — grading chat
    // ===================================================================
    function doGrade() {
      sending = true;
      transient = thinkingBubble('Grading…');
      render();
      scrollToBottom();
      setTimeout(() => {
        transient = null;
        addGrade(FAKE_GRADE);
        suggested = FAKE_GRADE.grade;
        sending = false;
        render();
        scrollToLastAgent();
      }, 900);
    }

    // ===================================================================
    // Shared reply handler — dispatches by phase
    // ===================================================================
    function onSend() {
      const text = reply.value.trim(); if (!text) return;
      reply.value = ''; reply.style.height = 'auto';
      if (phase === 'transcribe') {
        addUser(text);            // a correction
        render();
        scrollToBottom();
        readPhoto('Re-reading…');
      } else {
        addUser(text);            // an answer / clarification
        render();
        scrollToBottom();
        void doGrade();
      }
    }

    // ===================================================================
    // Top bar + footer wiring
    // ===================================================================
    function nextItem() { window.location.href = 'learn.html'; }
    document.getElementById('back-btn').addEventListener('click', () => { window.location.href = 'learn.html'; });
    document.getElementById('skip-btn').addEventListener('click', nextItem);

    sendBtn.addEventListener('click', onSend);
    reply.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); onSend(); } });
    reply.addEventListener('input', () => autoGrow(reply, 120));

    advanceBtn.addEventListener('click', enterGradePhase);

    gradeRow.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-grade]');
      if (!btn) return;
      // → api.saveAttempt({ questionId, grade: btn.dataset.grade, transcript })
      nextItem();
    });

    // ===================================================================
    // Boot
    // ===================================================================
    if (mode === 'photo') {
      startPhotoFlow();
    } else {
      phase = 'grade';
      for (const t of DEMO) {
        if (t.role === 'user') addUser(t.text);
        else { addGrade(t.payload); suggested = t.payload.grade; }
      }
      render();
      scrollToTop();
      reply.focus();
    }
  </script>
  <script src="footer.js" defer></script>
</body>
</html>
